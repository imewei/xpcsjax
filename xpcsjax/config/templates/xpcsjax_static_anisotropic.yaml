# =============================================================================
# xpcsjax — STATIC ANISOTROPIC TEMPLATE
# =============================================================================
# Three-parameter anomalous-diffusion model with per-angle scaling.
# Use this template when the sample is at rest (no shear flow) but the
# correlation function still depends on the scattering angle phi — typically
# because the q-vector samples different microstructural directions, or
# because the detector geometry imposes angle-dependent contrast / offset.
#
# Physics model:
#   D(t) = D0 · t^alpha + D_offset                         [diffusion law]
#   c2(t1, t2; phi) = offset(phi) + contrast(phi) · |g1|^2 [per-angle scaling]
#
# Parameters (3 physical + 2N scaling for N phi angles):
#   D0        — diffusion prefactor                            [Å²/s]
#   alpha     — anomalous-diffusion exponent                   [dimensionless]
#   D_offset  — baseline diffusion                             [Å²/s]
#   contrast_i, offset_i — per-angle speckle scaling           [dimensionless]
#
# Scope: xpcsjax is NLSQ-only. Bayesian sampling (NumPyro, NUTS, CMC) is
# permanently out of scope — use the upstream `homodyne` package for that.
# =============================================================================

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
metadata:
  config_version: "0.1.0"
  description: "xpcsjax static anisotropic — 3-param diffusion with per-angle scaling"
  parameter_count: 3
  physics_model: "D(t) = D0 · t^alpha + D_offset"
  template_type: "production_ready"
  complexity: "focused"
  generated_at: null  # Auto-filled by CLI
  generated_by: null

# -----------------------------------------------------------------------------
# ANALYSIS MODE
# -----------------------------------------------------------------------------
# Canonical: "static_anisotropic". Synonyms ("static", "STATIC") are
# normalized by ConfigManager._normalize_analysis_mode().
analysis_mode: "static_anisotropic"

# -----------------------------------------------------------------------------
# ANALYZER PARAMETERS
# -----------------------------------------------------------------------------
# Required: dt, start_frame, end_frame. Optional: frame_step, time_unit.
# scattering.wavevector_q and geometry.stator_rotor_gap are read by
# xpcsjax.optimization.nlsq.core.
analyzer_parameters:
  dt: 0.1                # Time step between frames [seconds]
  start_frame: 1         # First frame to analyze (1-indexed)
  end_frame: 1000        # Last frame, inclusive
  frame_step: 1
  time_unit: "seconds"

  scattering:
    wavevector_q: 0.0237 # Wave-vector magnitude [Å⁻¹]

  geometry:
    stator_rotor_gap: 2000000  # Gap [Å]; not used in static modes, but
                               # required by the loader for symmetry with
                               # laminar_flow / two_component configs.

# -----------------------------------------------------------------------------
# ANALYSIS SETTINGS
# -----------------------------------------------------------------------------
analysis_settings:
  model_description:
    type: "static_anisotropic"
    parameters: ["D0", "alpha", "D_offset"]
    physics: "Anomalous diffusion D(t) = D0·t^alpha + D_offset"
    per_angle_scaling: true

# -----------------------------------------------------------------------------
# EXPERIMENTAL DATA
# -----------------------------------------------------------------------------
# Two equivalent formats are supported:
#   (a) Modern:   file_path: "/abs/or/relative/to/data.h5"
#   (b) Legacy:   data_folder_path + data_file_name (auto-normalized to file_path)
# Set ONE of them; the loader is happy with either.
experimental_data:
  file_path: null                    # e.g. "/data/xpcs_sample_001.h5"
  data_folder_path: "./data/"
  data_file_name: "sample.hdf"
  phi_angles_path: "./data/"
  phi_angles_file: "phi_list.txt"

  cache_directory: "./cache"
  use_caching: true
  cache_filename_template: "cached_c2_frames_${start_frame}_${end_frame}.npz"
  cache_compression: true

  data_type: "APS_old"               # "APS_old" | "APS_new" | "custom"
  file_format: "hdf5"                # "hdf5" | "nexus" | "npz"
  exchange_key: "exchange"           # HDF5 group key for APS-style files

# -----------------------------------------------------------------------------
# PHI FILTERING — angle subset selection
# -----------------------------------------------------------------------------
# For anisotropic static analysis you typically want a moderate spread of
# angles so the per-angle scaling can resolve the angular contrast variation.
phi_filtering:
  enabled: true
  target_ranges:
    - min_angle: -10.0
      max_angle:  10.0
      description: "Primary axis"
    - min_angle:  85.0
      max_angle:  95.0
      description: "Perpendicular"
  fallback_to_all_angles: true
  algorithm: "range_based"
  tolerance: 3.0  # degrees

  quality_control:
    min_angles_required: 1
    max_angle_spread: 36.0
    validate_coverage: true
    require_orthogonal_angles: false   # not required for static

# -----------------------------------------------------------------------------
# INITIAL PARAMETERS
# -----------------------------------------------------------------------------
# values: null  →  use mid-bounds from parameter_space (recommended)
# values: [..]  →  list of 3 floats matching parameter_names order
# per_angle_scaling.contrast / .offset: null → quantile-based init per angle
initial_parameters:
  parameter_names:
    - D0
    - alpha
    - D_offset

  values: null
  # Example: [1000.0, 0.5, 10.0]

  per_angle_scaling:
    contrast: null   # null = quantile init, or [0.05, 0.06] for 2 angles
    offset:   null   # null = quantile init, or [1.0, 0.99] for 2 angles

  units:
    - "Å²/s"
    - "dimensionless"
    - "Å²/s"

  active_parameters: null   # e.g. ["D0", "alpha"] to freeze D_offset
  fixed_parameters: null    # e.g. {"D_offset": 0.0}

# -----------------------------------------------------------------------------
# PARAMETER SPACE — bounds (must align with the xpcsjax registry)
# -----------------------------------------------------------------------------
# Bounds below mirror xpcsjax.config.parameter_registry._PARAMETERS.
# Tighten per dataset if you have physical reason; widen with care.
# NLSQ uses min/max as box constraints — `type:` is informational only here
# (it is meaningful for the upstream Bayesian path, not for xpcsjax NLSQ).
parameter_space:
  model: "static_anisotropic"

  bounds:
    - name: contrast
      min: 0.0
      max: 1.0
      type: TruncatedNormal
      unit: "dimensionless"

    - name: offset
      min: 0.5
      max: 1.5
      type: TruncatedNormal
      unit: "dimensionless"

    - name: D0
      min: 100.0
      max: 100000.0
      type: TruncatedNormal
      unit: "Å²/s"

    - name: alpha
      min: -2.0
      max:  2.0
      type: TruncatedNormal
      unit: "dimensionless"

    - name: D_offset
      min: -100000.0
      max:  100000.0
      type: TruncatedNormal
      unit: "Å²/s"

# -----------------------------------------------------------------------------
# OPTIMIZATION (NLSQ-only)
# -----------------------------------------------------------------------------
# Strategy is selected automatically by xpcsjax.optimization.nlsq.select_nlsq_strategy
# based on memory budget and dataset size:
#   < 1M points  → STANDARD       (direct curve_fit)
#   1M–10M       → LARGE          (optimized curve_fit_large)
#   10M–100M     → CHUNKED        (memory-bounded chunks)
#   > 100M       → HYBRID_STREAMING (checkpoint/resume, fault tolerant)
optimization:
  method: "nlsq"

  nlsq:
    workflow: "auto"
    goal: "quality"               # "quality" | "robust" | "fast" | "memory_efficient"

    # Memory routing — choose one:
    memory_fraction: 0.75         # use 75% of available RAM
    # memory_threshold_gb: 48.0   # OR an explicit threshold

    # Convergence
    max_iterations: 10000
    tolerance: 1.0e-8             # ftol
    xtol: 1.0e-8
    gtol: 1.0e-8
    trust_region_scale: 1.0
    verbose: false

    # Loss function — soft_l1 is the recommended default for XPCS data
    loss: "soft_l1"               # "linear" | "huber" | "soft_l1" | "cauchy" | "arctan"

    # Parameter scaling — null = automatic Jacobian-based ("jac")
    x_scale: "jac"
    x_scale_map: null

    progress:
      enable: true
      verbose: 1                  # 0=quiet | 1=milestones | 2=detailed
      log_interval: 10

    diagnostics:
      enabled: false
      sample_size: 2048
      check_gradients: true
      log_jacobian_norms: false

    # -----------------------------------------------------------------------
    # ANTI-DEGENERACY — for static modes the structural degeneracy is mild
    # (no shear cancellation), so the default 4-layer defense is sufficient.
    # L5 shear-weighting is laminar_flow-only and has no effect here.
    # -----------------------------------------------------------------------
    anti_degeneracy:
      enable: true

      per_angle_mode: "auto"      # "auto" | "constant" | "fourier" | "individual"
      constant_scaling_threshold: 3
      fourier_order: 2
      fourier_auto_threshold: 6

      hierarchical:
        enable: false             # not needed for static (no shear)
        max_outer_iterations: 5
        outer_tolerance: 1.0e-6
        physical_max_iterations: 100
        per_angle_max_iterations: 50

      regularization:
        enable: false
        mode: "relative"
        lambda: 1.0
        target_cv: 0.10
        target_contribution: 0.10
        max_cv: 0.20
        auto_tune_lambda: true

      gradient_monitoring:
        enable: true
        ratio_threshold: 0.01
        consecutive_triggers: 5
        response: "warn"          # "warn" | "hierarchical" | "reset" | "abort"

    # -----------------------------------------------------------------------
    # CMA-ES — disabled by default (static parameters are well-scaled)
    # -----------------------------------------------------------------------
    cmaes:
      enable: false
      preset: "cmaes"
      max_generations: null
      sigma: 0.5
      sigma_warmstart: 0.05
      warmstart_auto_skip: true
      warmstart_skip_threshold: 5.0
      popsize: null
      tol_fun: 1.0e-8
      tol_x: 1.0e-8
      restart_strategy: "bipop"
      max_restarts: 5
      memory_limit_gb: 8.0
      auto_select: true
      scale_threshold: 1000.0
      normalize: true
      normalization_epsilon: 1.0e-12
      refine_with_nlsq: true
      refinement_ftol: 1.0e-10
      refinement_xtol: 1.0e-10
      refinement_gtol: 1.0e-10
      refinement_max_nfev: 500
      refinement_loss: "linear"

    # -----------------------------------------------------------------------
    # MULTI-START — useful for static modes when LHS exploration is desired
    # -----------------------------------------------------------------------
    multi_start:
      enable: false
      n_starts: 10
      seed: 42
      sampling_strategy: "latin_hypercube"
      n_workers: 0
      use_screening: true
      screen_keep_fraction: 0.5
      refine_top_k: 3
      refinement_ftol: 1.0e-12
      degeneracy_threshold: 0.1

    # -----------------------------------------------------------------------
    # HYBRID STREAMING — auto-activates for >10M points
    # -----------------------------------------------------------------------
    hybrid_streaming:
      enable: true
      normalize: true
      normalization_strategy: "auto"   # "auto" | "bounds" | "p0" | "none"
      warmup_iterations: 200
      max_warmup_iterations: 500
      warmup_learning_rate: 0.001
      gauss_newton_max_iterations: 100
      gauss_newton_tol: 1.0e-8
      chunk_size: 10000
      trust_region_initial: 1.0
      regularization_factor: 1.0e-10
      enable_checkpoints: true
      checkpoint_frequency: 100
      validate_numerics: true
      verbose: 1
      log_frequency: 1

      # 4-layer warmup-defense (NLSQ 0.3.6+)
      enable_warm_start_detection: true
      warm_start_threshold: 0.01
      enable_adaptive_warmup_lr: true
      warmup_lr_refinement: 1.0e-6
      warmup_lr_careful: 1.0e-5
      enable_cost_guard: true
      cost_increase_tolerance: 0.05
      enable_step_clipping: true
      max_warmup_step_size: 0.1

    quality_validation:
      enable: true
      reduced_chi_squared_threshold: 10.0
      warn_on_max_restarts: true
      warn_on_bounds_hit: true
      warn_on_convergence_failure: true
      bounds_tolerance: 1.0e-9

  # ---------------------------------------------------------------------------
  # STREAMING (>100M points) — checkpoint / resume
  # ---------------------------------------------------------------------------
  streaming:
    enable_checkpoints: true
    checkpoint_dir: "./checkpoints"
    checkpoint_frequency: 10
    resume_from_checkpoint: true
    keep_last_checkpoints: 3
    enable_fault_tolerance: true
    max_retries_per_batch: 2
    min_success_rate: 0.5
    batch_size: null
    adaptive_batching: true

  # ---------------------------------------------------------------------------
  # STRATIFICATION (angle-stratified chunking)
  # ---------------------------------------------------------------------------
  stratification:
    enabled: "auto"           # "auto" | true | false
    target_chunk_size: 100000
    max_imbalance_ratio: 5.0
    force_sequential_fallback: false
    check_memory_safety: true
    use_index_based: false
    collect_diagnostics: false
    log_diagnostics: false

  # ---------------------------------------------------------------------------
  # SEQUENTIAL — fallback for extreme angle imbalance
  # ---------------------------------------------------------------------------
  sequential:
    min_success_rate: 0.5
    weighting: "inverse_variance"  # "inverse_variance" | "uniform" | "n_points"

  # ---------------------------------------------------------------------------
  # RECOVERY — automatic retry with progressively conservative settings
  # ---------------------------------------------------------------------------
  recovery:
    enable: true
    max_attempts: 3
    lr_decay: 0.5
    lambda_growth: 2.0
    trust_decay: 0.5
    log_retries: true

  # ---------------------------------------------------------------------------
  # ANGLE FILTERING — secondary filter applied at the optimizer layer
  # (phi_filtering at the top level is the primary filter; this is an
  # opt-in restriction that further narrows the angles passed to NLSQ)
  # ---------------------------------------------------------------------------
  angle_filtering:
    enabled: false
    target_angle_ranges: []

# -----------------------------------------------------------------------------
# NOISE ESTIMATION — disabled by default (Bayesian sub-tooling)
# -----------------------------------------------------------------------------
# When enabled, this runs the upstream Adam/NumPyro noise estimator. xpcsjax
# itself does not ship a Bayesian sampler; leave disabled unless you have the
# `homodyne` package installed and want to estimate per-angle noise variance.
noise_estimation:
  enabled: false
  model: "per_angle"           # "per_angle" | "global"

# -----------------------------------------------------------------------------
# PERFORMANCE — CPU-only (v0.1 has no GPU path; NLSQ_SKIP_GPU_CHECK=1 is set)
# -----------------------------------------------------------------------------
performance:
  strategy_override: null      # null | "standard" | "large" | "chunked" | "streaming"
  memory_limit_gb: null        # null = auto-detect
  enable_progress: true

  memory_optimization:
    enabled: true
    max_memory_usage_gb: 6.0
    chunk_size: 8000
    enable_caching: true
    cache_strategy: "adaptive"  # "adaptive" | "aggressive" | "conservative"

  computation:
    enable_jit: true            # JAX JIT — keep on
    cpu_threads: "auto"
    vectorization_level: "high"

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  enabled: true
  level: "INFO"                 # "DEBUG" | "INFO" | "WARNING" | "ERROR"

  console:
    enabled: true
    level: "INFO"
    format: "detailed"          # "simple" | "detailed"
    colors: true
    show_progress: true

  file:
    enabled: false
    level: "DEBUG"
    path: "./logs/"
    filename: "xpcsjax_static_anisotropic.log"
    max_size_mb: 10
    backup_count: 5

  modules:
    "xpcsjax.data.phi_filtering": "INFO"
    "xpcsjax.data.xpcs_loader": "INFO"
    "xpcsjax.optimization.nlsq": "INFO"
    "jax._src": "WARNING"

# -----------------------------------------------------------------------------
# QUALITY CONTROL
# -----------------------------------------------------------------------------
quality_control:
  enabled: false

  angle_quality:
    validate_angle_coverage: true
    min_angles_per_range: 1
    check_angle_distribution: true

  multi_angle_validation:
    check_correlation_consistency: true
    validate_angle_dependencies: false   # less meaningful in static modes
    detect_anomalous_angles: true

# -----------------------------------------------------------------------------
# PLOTTING
# -----------------------------------------------------------------------------
plotting:
  save_plots: true
  show_plots: false
  format: "png"                 # "png" | "pdf" | "svg"
  dpi: 300
  style: "publication"

  preview_mode: false           # false = matplotlib | true = datashader
  fit_surface: "solver"         # "solver" | "posthoc"

  color_scale:
    mode: "legacy"              # "legacy" | "adaptive"
    pin_legacy_range: true
    percentile_min: 1.0
    percentile_max: 99.0
    fixed_min: 1.0
    fixed_max: 1.5

  datashader:
    canvas_width: 1200
    canvas_height: 1200

  matplotlib:
    interpolation: "bilinear"   # "none" | "bilinear" | "bicubic"
    use_tight_layout: true
    savefig_kwargs:
      bbox_inches: "tight"
      pad_inches: 0.1

  correlation_function: true
  fit_quality: true
  residual_analysis: true
  angle_coverage: true
  angle_correlation: false      # static modes — angles are independent

# -----------------------------------------------------------------------------
# OUTPUT
# -----------------------------------------------------------------------------
output:
  directory: "./results"
  base_directory: "./xpcsjax_results/"

  formats:
    hdf5: true
    json: true
    csv: true
    yaml: true
    npz: true

  create_subdirs: true          # creates nlsq/, characterization/
  timestamp_dirs: false

  compress_hdf5: true
  compression_level: 6
  include_diagnostics: true

# -----------------------------------------------------------------------------
# VALIDATION
# -----------------------------------------------------------------------------
validation:
  strict_mode: false            # true = raise on warnings
  check_file_existence: true
  validate_parameter_ranges: true
  check_mode_compatibility: true

  angle_validation:
    require_multiple_angles: false  # static_anisotropic accepts a single angle
    min_angle_count: 1
    validate_angle_ranges: true
