# =============================================================================
# xpcsjax — LAMINAR FLOW TEMPLATE
# =============================================================================
# Seven-parameter homodyne model: 3 diffusion + 4 shear-flow parameters.
# Use this template when the sample is under laminar shear (e.g. rheo-XPCS,
# Couette flow, microfluidic channel) and the c2 surface shows the
# characteristic shear-induced oscillations along the velocity direction.
#
# Physics model:
#   D(t)  = D0 · t^alpha + D_offset                               [diffusion]
#   γ̇(t) = γ̇₀ · t^beta + γ̇_offset                                [shear rate]
#   sinc² envelope along cos(phi − phi0) modulates |g1|²          [shear coupling]
#
# Parameters (7 physical + 2N scaling for N phi angles):
#   D0, alpha, D_offset                — anomalous diffusion
#   gamma_dot_t0, beta, gamma_dot_t_offset  — shear-rate evolution
#   phi0                               — flow direction angle [degrees]
#   contrast_i, offset_i               — per-angle speckle scaling
#
# CRITICAL: Laminar flow benefits strongly from L2 hierarchical and
# L5 shear-weighting in the anti-degeneracy controller. Defaults below
# enable both. Disable only if you understand the trade-off.
#
# Scope: xpcsjax is NLSQ-only. Bayesian sampling is permanently out of scope.
# =============================================================================

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
metadata:
  config_version: "0.1.0"
  description: "xpcsjax laminar flow — 7-param diffusion + shear with per-angle scaling"
  parameter_count: 7
  physics_model: "D(t)=D0·t^alpha+D_offset; γ̇(t)=γ̇₀·t^beta+γ̇_offset; shear coupling via cos(φ−φ0)"
  template_type: "production_ready"
  complexity: "full"
  generated_at: null
  generated_by: null

# -----------------------------------------------------------------------------
# ANALYSIS MODE
# -----------------------------------------------------------------------------
analysis_mode: "laminar_flow"

# -----------------------------------------------------------------------------
# ANALYZER PARAMETERS
# -----------------------------------------------------------------------------
# geometry.stator_rotor_gap is the physical Couette gap and IS used in
# laminar flow — the loader passes it through to NLSQ for path-length
# normalization. Set it to the actual gap of your rheometer cell.
analyzer_parameters:
  dt: 0.1
  start_frame: 1
  end_frame: 1000
  frame_step: 1
  time_unit: "seconds"

  scattering:
    wavevector_q: 0.0237          # Wave-vector magnitude [Å⁻¹]

  geometry:
    stator_rotor_gap: 2000000     # Couette gap [Å] — 200 μm typical
                                  # MUST be physically realistic for laminar_flow

# -----------------------------------------------------------------------------
# ANALYSIS SETTINGS
# -----------------------------------------------------------------------------
analysis_settings:
  model_description:
    type: "laminar_flow"
    parameters:
      - "D0"
      - "alpha"
      - "D_offset"
      - "gamma_dot_t0"
      - "beta"
      - "gamma_dot_t_offset"
      - "phi0"
    physics: "Anomalous diffusion + laminar shear (γ̇·cos(φ−φ0) coupling)"
    per_angle_scaling: true

# -----------------------------------------------------------------------------
# EXPERIMENTAL DATA
# -----------------------------------------------------------------------------
experimental_data:
  file_path: null
  data_folder_path: "./data/"
  data_file_name: "sample_flow.hdf"
  phi_angles_path: "./data/"
  phi_angles_file: "phi_list.txt"

  cache_directory: "./cache"
  use_caching: true
  cache_filename_template: "cached_c2_frames_${start_frame}_${end_frame}.npz"
  cache_compression: true

  data_type: "APS_old"
  file_format: "hdf5"
  exchange_key: "exchange"

# -----------------------------------------------------------------------------
# PHI FILTERING
# -----------------------------------------------------------------------------
# Laminar flow REQUIRES angles spanning both parallel and perpendicular
# directions so the shear coupling cos(phi−phi0) can be resolved.
# require_orthogonal_angles is therefore set to true.
phi_filtering:
  enabled: true
  target_ranges:
    - min_angle: -10.0
      max_angle:  10.0
      description: "Parallel to flow (sees full shear coupling)"
    - min_angle:  85.0
      max_angle:  95.0
      description: "Perpendicular to flow (diffusion-only)"
    # Uncomment for stronger coverage of the shear oscillation:
    # - min_angle: -95.0
    #   max_angle: -85.0
    #   description: "Perpendicular (opposite side)"
    # - min_angle: 170.0
    #   max_angle: -170.0
    #   description: "Antiparallel"
  fallback_to_all_angles: true
  algorithm: "range_based"
  tolerance: 3.0

  quality_control:
    min_angles_required: 2          # need ≥2 for flow direction recovery
    max_angle_spread: 36.0
    validate_coverage: true
    require_orthogonal_angles: true # CRITICAL for laminar_flow

# -----------------------------------------------------------------------------
# INITIAL PARAMETERS
# -----------------------------------------------------------------------------
initial_parameters:
  parameter_names:
    - D0
    - alpha
    - D_offset
    - gamma_dot_t0
    - beta
    - gamma_dot_t_offset
    - phi0

  values: null
  # Example: [1000.0, 0.5, 10.0, 0.01, 0.0, 0.0, 0.0]
  #          [   D0 , α  ,   D₀ , γ̇₀  , β , γ̇off , φ₀]
  #
  # Physical guidance for laminar-flow initial values:
  #   D0           ~ 1000 Å²/s     (sub-µm colloids in viscous fluid)
  #   alpha        ~ 0.5           (mild superdiffusion under shear is common)
  #   D_offset     ~ 10            (small Brownian baseline)
  #   gamma_dot_t0 ~ 0.01 s⁻¹      (start near expected shear rate)
  #   beta         ~ 0.0           (steady shear; ~0.5 for accelerating flow)
  #   gamma_dot_t_offset ~ 0.0     (rarely nonzero)
  #   phi0         ~ 0.0 degrees   (assume flow aligned with detector axis;
  #                                  widen bounds if misalignment suspected)

  per_angle_scaling:
    contrast: null
    offset:   null

  units:
    - "Å²/s"
    - "dimensionless"
    - "Å²/s"
    - "s⁻¹"
    - "dimensionless"
    - "s⁻¹"
    - "degrees"

  active_parameters: null
  fixed_parameters: null
  # Common simplification: freeze the shear time-dependence parameters for
  # near-steady-state experiments — this cuts the problem from 7-D to 5-D
  # and is much more stable:
  #   fixed_parameters: {"gamma_dot_t_offset": 0.0, "beta": 0.0}
  # Then the shear becomes γ̇(t) = γ̇₀ (constant), which is the textbook
  # steady-state Couette assumption.

# -----------------------------------------------------------------------------
# PARAMETER SPACE — bounds match the xpcsjax registry
# -----------------------------------------------------------------------------
parameter_space:
  model: "laminar_flow"

  bounds:
    - name: contrast
      min: 0.0
      max: 1.0
      type: TruncatedNormal
      unit: "dimensionless"

    - name: offset
      min: 0.5
      max: 1.5
      type: TruncatedNormal
      unit: "dimensionless"

    - name: D0
      min: 100.0
      max: 100000.0
      type: TruncatedNormal
      unit: "Å²/s"

    - name: alpha
      min: -2.0
      max:  2.0
      type: TruncatedNormal
      unit: "dimensionless"

    - name: D_offset
      min: -100000.0
      max:  100000.0
      type: TruncatedNormal
      unit: "Å²/s"

    - name: gamma_dot_t0
      min: 1.0e-6
      max: 0.5
      type: TruncatedNormal
      unit: "s⁻¹"

    - name: beta
      min: -2.0
      max:  2.0
      type: TruncatedNormal
      unit: "dimensionless"

    - name: gamma_dot_t_offset
      min: -0.1
      max:  0.1
      type: TruncatedNormal
      unit: "s⁻¹"

    - name: phi0
      min: -10.0           # tight bounds for stable convergence
      max:  10.0
      type: TruncatedNormal
      unit: "degrees"

# -----------------------------------------------------------------------------
# OPTIMIZATION (NLSQ-only) — laminar_flow tuning
# -----------------------------------------------------------------------------
# Strategy selection is AUTOMATIC based on dataset size:
#   < 1M  → STANDARD          1M–10M  → LARGE
#   10M–100M  → CHUNKED       > 100M  → HYBRID_STREAMING
#
# Loss-function selection guide:
#   "linear"    Clean, well-characterized data        (fastest)
#   "soft_l1"   Typical XPCS data                     (RECOMMENDED default) ⭐
#   "huber"     Few outliers                          (quadratic+linear hybrid)
#   "cauchy"    Severe outlier contamination          (heavy-tail robust)
#
# LAMINAR-FLOW-SPECIFIC NOTES:
#   * The shear-induced sinc² envelope along cos(phi−phi0) is HIGH-FREQUENCY
#     in t1+t2 space. soft_l1 is a safer choice than linear because the
#     envelope edges are sensitive to outliers.
#   * Goal "robust" trades a small amount of precision for far better
#     convergence on noisy or partially-saturated data — consider it for
#     real-rheo-XPCS data where contrast is low.
#   * For high-shear-rate / fast-oscillation data, you may need to bump
#     max_iterations to 20k–30k.
optimization:
  method: "nlsq"

  nlsq:
    workflow: "auto"              # informational only — xpcsjax routes itself
    goal: "quality"               # "quality" | "robust" | "fast" | "memory_efficient"

    # Memory routing — adaptive percentage (preferred) OR fixed GB threshold
    memory_fraction: 0.75
    # memory_threshold_gb: 48.0

    # Convergence — bump max_iterations to 20k–30k for high-shear data
    max_iterations: 10000
    tolerance: 1.0e-8             # ftol
    xtol: 1.0e-8
    gtol: 1.0e-8
    trust_region_scale: 1.0
    verbose: false

    # soft_l1 is recommended for the noisy envelope edges of shear-induced
    # oscillations — see selection guide above
    loss: "soft_l1"

    # ----------------------------------------------------------------------
    # PARAMETER SCALING — LAMINAR FLOW SPECIFIC (the #1 user pitfall)
    # ----------------------------------------------------------------------
    # Laminar-flow Jacobian columns can span 10+ orders of magnitude:
    #   ∂χ²/∂D0           ~ 10⁰
    #   ∂χ²/∂gamma_dot_t0 ~ 10⁻⁶   ← 6 orders smaller!
    # With x_scale="jac" (automatic), the trust-region step is dominated
    # by the largest gradient — and the shear params barely move. The
    # fit then "converges" with flat shear params and bogus chi².
    #
    # SYMPTOM checklist (you need x_scale_map if you see ANY of these):
    #   * gamma_dot_t0 stays at its initial value after a fit
    #   * No oscillations visible in the predicted c2 surface
    #   * Reduced chi² is much worse than expected
    #   * Multi-start finds very different shear params from different seeds
    #
    # DIAGNOSIS RECIPE:
    #   1. Run an initial NLSQ fit with x_scale="jac" and x_scale_map=null
    #   2. python scripts/diagnose_gradients.py --results-dir ./xpcsjax_results
    #   3. Paste the script's output into the x_scale_map block below
    #   4. Re-run NLSQ. Shear params should now respond.
    #
    # Values shown below are an EXAMPLE from the C020 dataset (Nov 2025).
    # Always compute dataset-specific values — bounds matter.
    x_scale: "jac"
    x_scale_map: null
    # x_scale_map:                  # uncomment + replace with diagnose output
    #   D0: 1.20
    #   alpha: 7.61e-4
    #   D_offset: 1.13
    #   gamma_dot_t0: 3.71e-6       # ~6 orders smaller than D0 — see why?
    #   beta: 3.14e-4
    #   gamma_dot_t_offset: 9.30e-8
    #   phi0: 0.739

    progress:
      enable: true
      verbose: 1
      log_interval: 10

    diagnostics:
      enabled: false
      sample_size: 2048
      check_gradients: true
      log_jacobian_norms: false

    # ----------------------------------------------------------------------
    # ANTI-DEGENERACY DEFENSE SYSTEM — full 5-layer stack for laminar_flow
    # ----------------------------------------------------------------------
    # Laminar_flow hits THREE root causes that the defense stack addresses:
    #   1. Gradient Cancellation: the shear gradient ∂χ²/∂γ̇₀ flips sign
    #      across phi angles. Without weighting, contributions from
    #      different angles cancel and the optimizer cannot find γ̇₀.
    #   2. Structural Degeneracy: per-angle (contrast, offset) can absorb
    #      the shear oscillation signal if naively fit jointly. Worse
    #      with more phi angles.
    #   3. Scale Imbalance: D0 / γ̇₀ scale ratio is often > 1e6 (handled
    #      above by x_scale_map; the rest is handled by the layers below).
    #
    # 5-LAYER DEFENSE (all engaged by default for laminar_flow):
    #   L1: Fourier reparameterization (rarely needed; off by default)
    #   L2: Hierarchical alternating optimization (REQUIRED for L5)
    #   L3: Adaptive CV-based regularization (off; enable if L2+L5 insufficient)
    #   L4: Gradient-collapse detection + auto-recovery
    #   L5: Shear-sensitivity weighting — weight residuals by |cos(phi0−phi)|
    #
    # CRITICAL: L5 (shear_weighting) REQUIRES L2 (hierarchical.enable=true).
    # Without hierarchical, shear_weighting has no effect.
    #
    # PER-ANGLE MODE — controls how (contrast, offset) varies with angle:
    #   "auto"        Quantile-init averaged + jointly optimized   →  7 + 2 = 9 params
    #                 (auto-selects when n_phi >= constant_scaling_threshold)
    #   "constant"    Per-angle (β, o) FROZEN from quantile        →  7 params
    #   "fourier"     (β, o) as truncated Fourier series           →  7 + 2·(2K+1)
    #   "individual"  Independent per-angle (β_k, o_k), optimized  →  7 + 2·n_phi
    #                 (prone to absorption; avoid for many angles)
    #
    # Parameter count examples (laminar_flow, n_phi=23, fourier_order=2):
    #   constant:    7 params  (physical only)
    #   auto:        9 params  (7 + 2 averaged scaling)
    #   fourier:    17 params  (7 + 10 Fourier coeffs)
    #   individual: 53 params  (7 + 46 per-angle scaling)
    anti_degeneracy:
      enable: true

      per_angle_mode: "auto"               # auto → "constant" when n_phi >= threshold
      constant_scaling_threshold: 3
      fourier_order: 2                     # used only when per_angle_mode="fourier"
      fourier_auto_threshold: 6            # min angles for fourier mode

      # ---- L2 Hierarchical Optimization (REQUIRED for L5 shear_weighting) ----
      # Alternates between (a) physical-params solve with scaling frozen,
      # and (b) per-angle scaling solve with physics frozen. Breaks the
      # absorption coupling and lets L5 weighting take effect.
      hierarchical:
        enable: true                       # CRITICAL: must be true for L5
        max_outer_iterations: 5
        outer_tolerance: 1.0e-6
        physical_max_iterations: 100
        per_angle_max_iterations: 50

      # ---- L3 Adaptive Regularization (CV-based) ----
      # Off by default — enable only if L2+L5 are insufficient. The
      # "relative" mode scales lambda by data variance so it is invariant
      # to data magnitude; auto-tune adjusts lambda during the solve.
      regularization:
        enable: false
        mode: "relative"                   # "absolute" | "relative" | "auto"
        lambda: 1.0
        target_cv: 0.10
        target_contribution: 0.10
        max_cv: 0.20
        auto_tune_lambda: true

      # ---- L4 Gradient-Collapse Detection ----
      # Monitors |∇_physical| / |∇_scaling|. If it falls below threshold for
      # N consecutive iterations, the response action fires.
      # For laminar_flow, response="hierarchical" auto-switches to the L2
      # alternating solver, which usually recovers the fit.
      gradient_monitoring:
        enable: true
        ratio_threshold: 0.01
        consecutive_triggers: 5
        response: "hierarchical"           # "warn" | "hierarchical" | "reset" | "abort"

      # ---- L5 Shear-Sensitivity Weighting (laminar_flow only) ----
      # Weights residuals by w_i = max(|cos(phi0 − phi_i)|^alpha, min_weight)
      # so that angles ALIGNED with the flow (where shear info lives) get
      # more weight, and PERPENDICULAR angles (no shear signal) get the
      # floor min_weight. This kills the gradient-cancellation problem.
      #
      # alpha=1.0 is linear |cos| weighting. Use 2.0 to up-weight more
      # aggressively; rarely needed.
      # min_weight=0.3 keeps perpendicular angles contributing to the
      # diffusion fit (otherwise D0/alpha lose signal).
      # update_frequency=50 re-computes weights using the current phi0
      # estimate every 50 L-BFGS iterations.
      shear_weighting:
        enable: true                       # L5 — laminar_flow ONLY
        alpha: 1.0                         # 1.0 = linear |cos| weighting
        min_weight: 0.3                    # floor for perpendicular angles
        update_frequency: 50
        normalize: true                    # so mean weight = 1.0

    # ----------------------------------------------------------------------
    # CMA-ES GLOBAL OPTIMIZATION — strongly relevant for laminar_flow
    # ----------------------------------------------------------------------
    # WHEN TO USE CMA-ES FOR LAMINAR_FLOW:
    #   Laminar flow has D0 ~ 1e3 vs gamma_dot_t0 ~ 1e-3, so the natural
    #   parameter scale_ratio is ~1e6 — well above scale_threshold=1000.
    #   With auto_select=true, CMA-ES will engage automatically when needed.
    #   Toggle enable: true if:
    #     * Multi-start finds inconsistent local minima
    #     * NLSQ alone keeps converging to clearly-wrong parameters
    #     * You suspect the basin of attraction is multimodal
    #
    # TWO-PHASE ARCHITECTURE:
    #   Phase 1: CMA-ES Global Search — population-based, with BIPOP restarts
    #   Phase 2: NLSQ-TRF Refinement   — local polish from CMA-ES best
    #                                     (refine_with_nlsq: true)
    #
    # PRESETS:
    #   "cmaes-fast"    50 gen   — quick exploration
    #   "cmaes"         100 gen  — balanced
    #   "cmaes-global"  200 gen  — thorough (RECOMMENDED for laminar_flow)
    #
    # REQUIRES: pip install "nlsq[evosax]"
    cmaes:
      enable: false                    # toggle on when multi-start finds inconsistent minima
      preset: "cmaes-global"
      max_generations: null            # null = adaptive based on scale_ratio
      sigma: 0.5
      sigma_warmstart: 0.05
      warmstart_auto_skip: true
      warmstart_skip_threshold: 5.0
      popsize: null
      tol_fun: 1.0e-8
      tol_x: 1.0e-8
      restart_strategy: "bipop"
      max_restarts: 10
      memory_limit_gb: 8.0
      auto_select: true                # auto-engages on large scale_ratio
      scale_threshold: 1000.0
      normalize: true
      normalization_epsilon: 1.0e-12
      refine_with_nlsq: true
      refinement_ftol: 1.0e-10
      refinement_xtol: 1.0e-10
      refinement_gtol: 1.0e-10
      refinement_max_nfev: 500
      refinement_loss: "linear"

    # ----------------------------------------------------------------------
    # MULTI-START OPTIMIZATION
    # ----------------------------------------------------------------------
    # LHS-based exploration of the parameter space. Use INSTEAD OF CMA-ES,
    # not in addition — multi-start and CMA-ES address the same problem
    # (global search) with different mechanisms, and enabling both wastes
    # compute. Pick one:
    #   * CMA-ES for high scale-ratio problems (laminar_flow default)
    #   * multi_start for moderate scale-ratio problems where you want
    #     explicit degeneracy detection (the degeneracy_threshold flag
    #     surfaces nearby competing minima)
    #
    # EXECUTION MODE (auto-selected):
    #   < 500K points  → Parallel (ProcessPoolExecutor)
    #   ≥ 500K points  → Sequential (avoids pickling overhead)
    multi_start:
      enable: false
      n_starts: 10
      seed: 42
      sampling_strategy: "latin_hypercube"
      n_workers: 0
      use_screening: true
      screen_keep_fraction: 0.5
      refine_top_k: 3
      refinement_ftol: 1.0e-12
      degeneracy_threshold: 0.1

    # ----------------------------------------------------------------------
    # HYBRID STREAMING — large-dataset (>10M points) four-phase optimizer
    # ----------------------------------------------------------------------
    # Phase 0: Parameter normalization (handles wide scale ratios like D0/γ̇₀)
    # Phase 1: L-BFGS warmup with adaptive switching
    # Phase 2: Streaming Gauss-Newton (quadratic convergence, ~2 GB memory cap)
    # Phase 3: Denormalize + covariance transform back to original scale
    # Expected ~10× fewer iterations than direct LM for laminar_flow.
    # The 4-layer warmup defense below keeps warm-starts from diverging.
    hybrid_streaming:
      enable: true
      normalize: true
      normalization_strategy: "auto"        # "auto" | "bounds" | "p0" | "none"
      warmup_iterations: 200
      max_warmup_iterations: 500
      warmup_learning_rate: 0.001
      gauss_newton_max_iterations: 100
      gauss_newton_tol: 1.0e-8
      chunk_size: 10000
      trust_region_initial: 1.0
      regularization_factor: 1.0e-10
      enable_checkpoints: true
      checkpoint_frequency: 100
      validate_numerics: true
      verbose: 1
      log_frequency: 1

      # 4-layer warmup defense (NLSQ 0.3.6+) — keep all 4 enabled.
      # Particularly important for laminar_flow where bad shear-param
      # warm-starts can derail L-BFGS catastrophically.
      # L1: skip warmup if loss already small
      # L2: scale LR by initial loss quality
      # L3: abort if cost rises > 5%
      # L4: clip per-iteration step to fraction of normalized range
      enable_warm_start_detection: true
      warm_start_threshold: 0.01
      enable_adaptive_warmup_lr: true
      warmup_lr_refinement: 1.0e-6
      warmup_lr_careful: 1.0e-5
      enable_cost_guard: true
      cost_increase_tolerance: 0.05
      enable_step_clipping: true
      max_warmup_step_size: 0.1

    quality_validation:
      enable: true
      reduced_chi_squared_threshold: 10.0
      warn_on_max_restarts: true
      warn_on_bounds_hit: true
      warn_on_convergence_failure: true
      bounds_tolerance: 1.0e-9

  streaming:
    enable_checkpoints: true
    checkpoint_dir: "./checkpoints"
    checkpoint_frequency: 10
    resume_from_checkpoint: true
    keep_last_checkpoints: 3
    enable_fault_tolerance: true
    max_retries_per_batch: 2
    min_success_rate: 0.5
    batch_size: null
    adaptive_batching: true

  stratification:
    enabled: "auto"
    target_chunk_size: 100000
    max_imbalance_ratio: 5.0
    force_sequential_fallback: false
    check_memory_safety: true
    use_index_based: false
    collect_diagnostics: false
    log_diagnostics: false

  sequential:
    min_success_rate: 0.5
    weighting: "inverse_variance"

  recovery:
    enable: true
    max_attempts: 3
    lr_decay: 0.5
    lambda_growth: 2.0
    trust_decay: 0.5
    log_retries: true

  angle_filtering:
    enabled: false
    target_angle_ranges: []

# -----------------------------------------------------------------------------
# NOISE ESTIMATION — Bayesian sub-tooling, disabled by default
# -----------------------------------------------------------------------------
noise_estimation:
  enabled: false
  model: "per_angle"

# -----------------------------------------------------------------------------
# PERFORMANCE
# -----------------------------------------------------------------------------
performance:
  strategy_override: null
  memory_limit_gb: null
  enable_progress: true

  memory_optimization:
    enabled: true
    max_memory_usage_gb: 6.0
    chunk_size: 8000
    enable_caching: true
    cache_strategy: "adaptive"

  computation:
    enable_jit: true
    cpu_threads: "auto"
    vectorization_level: "high"

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  enabled: true
  level: "INFO"

  console:
    enabled: true
    level: "INFO"
    format: "detailed"
    colors: true
    show_progress: true

  file:
    enabled: false
    level: "DEBUG"
    path: "./logs/"
    filename: "xpcsjax_laminar_flow.log"
    max_size_mb: 10
    backup_count: 5

  modules:
    "xpcsjax.data.phi_filtering": "INFO"
    "xpcsjax.data.xpcs_loader": "INFO"
    "xpcsjax.optimization.nlsq": "INFO"
    "jax._src": "WARNING"

# -----------------------------------------------------------------------------
# QUALITY CONTROL
# -----------------------------------------------------------------------------
quality_control:
  enabled: true                   # recommended for laminar flow

  angle_quality:
    validate_angle_coverage: true
    min_angles_per_range: 1
    check_angle_distribution: true

  multi_angle_validation:
    check_correlation_consistency: true
    validate_angle_dependencies: true   # essential for shear coupling
    detect_anomalous_angles: true

# -----------------------------------------------------------------------------
# PLOTTING
# -----------------------------------------------------------------------------
plotting:
  save_plots: true
  show_plots: false
  format: "png"
  dpi: 300
  style: "publication"

  preview_mode: false
  fit_surface: "solver"

  color_scale:
    mode: "legacy"
    pin_legacy_range: true
    percentile_min: 1.0
    percentile_max: 99.0
    fixed_min: 1.0
    fixed_max: 1.5

  datashader:
    canvas_width: 1200
    canvas_height: 1200

  matplotlib:
    interpolation: "bilinear"
    use_tight_layout: true
    savefig_kwargs:
      bbox_inches: "tight"
      pad_inches: 0.1

  correlation_function: true
  fit_quality: true
  residual_analysis: true
  angle_coverage: true
  angle_correlation: true         # shows the cos(phi−phi0) shear modulation

# -----------------------------------------------------------------------------
# OUTPUT
# -----------------------------------------------------------------------------
output:
  directory: "./results"
  base_directory: "./xpcsjax_results/"

  formats:
    hdf5: true
    json: true
    csv: true
    yaml: true
    npz: true

  create_subdirs: true
  timestamp_dirs: false

  compress_hdf5: true
  compression_level: 6
  include_diagnostics: true

# -----------------------------------------------------------------------------
# VALIDATION
# -----------------------------------------------------------------------------
validation:
  strict_mode: false
  check_file_existence: true
  validate_parameter_ranges: true
  check_mode_compatibility: true

  angle_validation:
    require_multiple_angles: true   # laminar flow REQUIRES ≥ 2 angles
    min_angle_count: 2
    validate_angle_ranges: true
