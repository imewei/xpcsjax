# =============================================================================
# xpcsjax — STATIC ISOTROPIC TEMPLATE
# =============================================================================
# Three-parameter anomalous-diffusion model with a single, angle-averaged
# scaling pair. Use this template when the sample is isotropic (no preferred
# orientation) so that g2(t1, t2; phi) is independent of phi, AND you do not
# need per-angle contrast/offset to capture detector anisotropy.
#
# Physics model — identical to static_anisotropic:
#   D(t) = D0 · t^alpha + D_offset
#   c2(t1, t2) = offset + contrast · |g1|^2     [single (contrast, offset) pair]
#
# WHEN TO USE STATIC_ISOTROPIC vs STATIC_ANISOTROPIC:
# ┌────────────────────────────────────────────────────┬──────────────────────┐
# │ Situation                                          │ Pick                 │
# ├────────────────────────────────────────────────────┼──────────────────────┤
# │ Sample known isotropic, single q-ring, single phi  │ static_isotropic     │
# │ Multiple phi angles but contrast varies negligibly │ static_isotropic     │
# │ Detector geometry imposes per-angle contrast       │ static_anisotropic   │
# │ Sample has preferred orientation                   │ static_anisotropic   │
# │ Not sure                                           │ static_anisotropic   │
# └────────────────────────────────────────────────────┴──────────────────────┘
# Total parameter count:
#   anisotropic: 3 physical + 2·N_phi scaling
#   isotropic:   3 physical + 2 (one shared) scaling
#
# Scope: xpcsjax is NLSQ-only. Bayesian sampling is permanently out of scope.
# For Bayesian XPCS analysis, use the upstream `homodyne` package.
# =============================================================================

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
metadata:
  config_version: "0.1.0"
  description: "xpcsjax static isotropic — 3-param diffusion with angle-averaged scaling"
  parameter_count: 3
  physics_model: "D(t) = D0 · t^alpha + D_offset"
  template_type: "production_ready"
  complexity: "minimal"
  generated_at: null
  generated_by: null

# -----------------------------------------------------------------------------
# ANALYSIS MODE
# -----------------------------------------------------------------------------
# Canonical: "static_isotropic". "isotropic" is normalized by the
# manager to this canonical form.
analysis_mode: "static_isotropic"

# -----------------------------------------------------------------------------
# ANALYZER PARAMETERS — describe the experimental run
# -----------------------------------------------------------------------------
analyzer_parameters:
  dt: 0.1                       # Time step between frames [seconds]. MUST be > 0.
                                # Wrong dt → wrong D0 (D0 scales with dt).
  start_frame: 1                # First frame to analyze, 1-INDEXED. MUST be >= 1.
                                # Use > 1 to skip beam-on transients.
  end_frame: 1000               # Last frame, INCLUSIVE. MUST be > start_frame and > 0.
                                # ⚠ -1 sentinel is REJECTED; resolve to absolute first.
  frame_step: 1                 # Stride between frames. 1 = use all (RECOMMENDED).
                                # >1 = subsample for exploration (logged when active).
  time_unit: "seconds"          # "seconds" (default) — internal math assumes SI.

  scattering:
    wavevector_q: 0.0237        # Wave-vector magnitude [Å⁻¹]. MUST be > 0.
                                # q = 4π/λ · sin(θ/2). Wrong q → wrong D0 (q² scaling).

  geometry:
    stator_rotor_gap: 2000000   # Couette gap [Å]. UNUSED in static; required by
                                # loader for cross-mode symmetry. Set realistically
                                # (here 200 µm) so config remains valid if you
                                # later switch to laminar_flow.

# -----------------------------------------------------------------------------
# ANALYSIS SETTINGS
# -----------------------------------------------------------------------------
analysis_settings:
  model_description:
    type: "static_isotropic"
    parameters: ["D0", "alpha", "D_offset"]
    physics: "Anomalous diffusion D(t) = D0·t^alpha + D_offset (angle-independent)"
    per_angle_scaling: false

# -----------------------------------------------------------------------------
# EXPERIMENTAL DATA — where to find the c2 data and the phi-angle list
# -----------------------------------------------------------------------------
# Two equivalent formats:
#   Modern: file_path  |  Legacy: data_folder_path + data_file_name
experimental_data:
  file_path: null                    # Modern: full path to data file.
                                     # null = use legacy fields below.
  data_folder_path: "./data/"        # Legacy: directory containing data file.
  data_file_name: "sample.hdf"       # Legacy: file basename.
                                     # Extension drives loader path:
                                     # .h5/.hdf/.hdf5/.nexus → HDF5 reader
                                     # .npz                  → cache-direct
  phi_angles_path: "./data/"         # Directory of phi-angles file.
  phi_angles_file: "phi_list.txt"    # Plain-text phi angles, one per line, DEGREES.

  cache_directory: "./cache"         # Where to read/write npz caches. MUST be writeable.
  use_caching: true                  # true = use cache (RECOMMENDED for repeated fits).
  cache_filename_template: "cached_c2_frames_${start_frame}_${end_frame}.npz"
                                     # supports ${start_frame}/${end_frame} substitution
  cache_compression: true            # true = gzip cache (smaller, slightly slower).

  # ⚠ data_type / file_format / exchange_key below are
  # INFORMATIONAL ONLY — NOT CONSULTED by the loader.
  # See the static_anisotropic template for the full explanation.
  data_type: "aps_old"               # NOT CONSULTED. Auto-detected by loader as
                                     # "aps_old" | "aps_u" | "unknown" from HDF5 structure.
  file_format: "hdf5"                # NOT CONSULTED. Loader routes by FILE EXTENSION:
                                     # .npz → cache | .h5/.hdf/.hdf5/.nexus → HDF5
  exchange_key: "exchange"           # NOT CONSULTED. APS-old reader hardcodes
                                     # "exchange/C2T_all"; this value is ignored.

# -----------------------------------------------------------------------------
# PHI FILTERING — angle subset selection
# -----------------------------------------------------------------------------
# Isotropic mode treats c2 as angle-independent, so you can either pin to
# one representative angle or use all available (the shared scaling is
# averaged either way).
phi_filtering:
  enabled: true                          # true = filter angles per target_ranges
                                         # false = pass all angles through
  target_ranges:                         # DEGREES; angles inside any range
                                         # (with `tolerance` slack) are kept.
    - min_angle: -10.0
      max_angle:  10.0
      description: "Representative angle for isotropic sample"
  fallback_to_all_angles: true           # true = use all angles if filter empties
  algorithm: "range_based"               # only "range_based" is supported
  tolerance: 5.0                         # slack [degrees] around target_range edges.
                                         # Wider here than anisotropic (default 3.0)
                                         # because we don't need precise angle picks.

  quality_control:
    min_angles_required: 1               # static_isotropic accepts any n_phi >= 1
    max_angle_spread: 90.0               # generous — isotropic ignores phi anyway
    validate_coverage: false             # off — isotropic doesn't care about coverage
    require_orthogonal_angles: false     # off — orthogonality only matters for flow

# -----------------------------------------------------------------------------
# INITIAL PARAMETERS
# -----------------------------------------------------------------------------
# per_angle_scaling holds *scalar* contrast/offset for isotropic mode
# (broadcast to all selected angles).
initial_parameters:
  parameter_names:
    - D0
    - alpha
    - D_offset

  values: null
  # Example: [1000.0, -1.2, 0.0]   (subdiffusion is common in equilibrium)

  per_angle_scaling:
    contrast: null   # null = quantile init, or a single float (broadcast)
    offset:   null   # null = quantile init, or a single float (broadcast)

  units:
    - "Å²/s"
    - "dimensionless"
    - "Å²/s"

  active_parameters: null
  fixed_parameters: null

# -----------------------------------------------------------------------------
# PARAMETER SPACE — bounds match the xpcsjax registry
# -----------------------------------------------------------------------------
# NLSQ uses min/max as BOX CONSTRAINTS. `type:` is "TruncatedNormal"
# (informational for the NLSQ path; meaningful in Bayesian which is out of
# scope). `unit:` is informational only, emitted in result reports.
parameter_space:
  model: "static_isotropic"

  bounds:
    - name: contrast
      min: 0.0                # physical lower bound (no contrast → no signal)
      max: 1.0                # physical upper bound (fully coherent)
      type: TruncatedNormal
      unit: "dimensionless"
      # Tighten to [0.01, 0.3] if you have a coherence-fraction estimate.

    - name: offset
      min: 0.5                # baseline should be ~1.0; <0.5 is rare
      max: 1.5                # >1.5 suggests normalization issue
      type: TruncatedNormal
      unit: "dimensionless"
      # Tighten to [0.95, 1.05] if normalization is validated.

    - name: D0
      min: 100.0              # ~µm particles, slow Brownian
      max: 100000.0           # ~10 nm particles, fast Brownian
      type: TruncatedNormal
      unit: "Å²/s"
      # Tighten to [500, 5000] if particle size known to within 2×.

    - name: alpha
      min: -2.0               # strong subdiffusion (jammed, glassy)
      max:  2.0               # strong superdiffusion (active, ballistic)
      type: TruncatedNormal
      unit: "dimensionless"
      # α=1 normal | α<1 sub | α>1 super | α=0 constant J(t)=D0

    - name: D_offset
      min: -100000.0          # negative rare; usually indicates arrested dynamics
      max:  100000.0          # symmetric for safety
      type: TruncatedNormal
      unit: "Å²/s"
      # Most fits give D_offset ≈ 0; tighten to [-1000, 1000] for well-behaved
      # samples or freeze via fixed_parameters: {"D_offset": 0.0}.

# -----------------------------------------------------------------------------
# OPTIMIZATION (NLSQ-only)
# -----------------------------------------------------------------------------
# Strategy selection is AUTOMATIC based on dataset size + available memory:
#   < 1M points     → STANDARD          (direct curve_fit)
#   1M–10M          → LARGE             (optimized curve_fit_large)
#   10M–100M        → CHUNKED           (memory-bounded chunks)
#   > 100M          → HYBRID_STREAMING  (checkpoint/resume, fault tolerant)
#
# Loss function selection guide:
#   "linear"    Clean, well-characterized data    (fastest)
#   "soft_l1"   Typical XPCS data                 (RECOMMENDED default) ⭐
#   "huber"     Few outliers                      (quadratic + linear hybrid)
#   "cauchy"    Severe outlier contamination      (heavy-tail robust)
#   "arctan"    Extreme outliers                  (bounded, very robust)
#
# For static_isotropic, parameters are well-scaled (3 params spanning
# ~10⁰–10³), so x_scale="jac" (automatic) is sufficient. See the static
# anisotropic / laminar_flow templates for x_scale_map diagnostic guidance.
optimization:
  method: "nlsq"

  nlsq:
    workflow: "auto"              # informational only — xpcsjax routes itself
    goal: "quality"               # "quality" | "robust" | "fast" | "memory_efficient"

    # Memory routing — adaptive percentage (preferred) OR fixed GB threshold
    memory_fraction: 0.75         # use 75% of available RAM
    # memory_threshold_gb: 48.0   # OR explicit threshold

    # Convergence — default 1e-8 is right for production
    max_iterations: 10000
    tolerance: 1.0e-8             # ftol
    xtol: 1.0e-8
    gtol: 1.0e-8
    trust_region_scale: 1.0
    verbose: false

    # soft_l1 is the recommended default for XPCS data — see table above
    loss: "soft_l1"

    # Parameter scaling — "jac" is fine for 3 well-scaled params
    x_scale: "jac"
    x_scale_map: null

    progress:
      enable: true                # true = tqdm progress bar; false = silent
      verbose: 1                  # 0 = silent | 1 = milestones (default) | 2 = per-iter
      log_interval: 10            # log every N iterations (with verbose >= 2)

    # Diagnostics OFF by default — turn on when investigating "stuck" parameters
    # or building an x_scale_map (see static_anisotropic template for the recipe).
    diagnostics:
      enabled: false              # true = compute diagnostics during fitting
      sample_size: 2048           # # of points for gradient check. CONSTRAINT: > 0
      check_gradients: true       # true = numerical-vs-analytic gradient check
      log_jacobian_norms: false   # true = log per-iteration column-wise J norms

    # -----------------------------------------------------------------------
    # ANTI-DEGENERACY — isotropic mode
    # -----------------------------------------------------------------------
    # The whole point of isotropic mode is "one (contrast, offset) shared
    # across angles" — so per_angle_mode is hard-pinned to "constant" with
    # threshold=1, which forces the constant-per-angle path to engage for
    # any n_phi >= 1. Other modes ("auto", "fourier", "individual") would
    # silently re-introduce per-angle scaling and defeat the purpose.
    #
    # Parameter count (isotropic, any n_phi):
    #   constant:  3 params  (3 physical only — scaling FROZEN per-angle)
    #
    # Hierarchical is unnecessary here (constant scaling is frozen). L5
    # shear_weighting is hard-gated to laminar_flow ONLY (see _LAYER_GATES in
    # anti_degeneracy_controller.py) — blocked for static modes, no flow/shear.
    anti_degeneracy:
      enable: true
      # OPT-IN L2/L3 anti-degeneracy ESCAPE on the >=1M stratified-LS path (fires
      # only for L2-applicable per-angle modes: individual / fourier).
      #   false (default) = single baseline solve; byte-identical to the
      #                     pre-escape path (the rtol=1e-10 homodyne-equivalence
      #                     oracle runs here).
      #   true            = after the baseline solve, run the L2 hierarchical
      #                     (+ L3) escape and KEEP it only if it beats the
      #                     baseline (keep-better guard -> result is never worse).
      # COST: the escape is EXPENSIVE -- ~3-5x the baseline fit wall-time
      # (multi-minute at >=1M points; measured ~3.5x on C044). Enable only for a
      # genuinely-stuck / degenerate fit; leave OFF by default. For a CHEAPER
      # escape, lower hierarchical.max_outer_iterations (and inner iterations).
      execute_layers: false

      per_angle_mode: "constant"           # FIXED for isotropic — do not change
      constant_scaling_threshold: 1        # engage constant scaling immediately
      fourier_order: 2                     # unused in constant mode
      fourier_auto_threshold: 6            # unused in constant mode

      hierarchical:
        enable: false
        max_outer_iterations: 5
        outer_tolerance: 1.0e-6
        physical_max_iterations: 100
        per_angle_max_iterations: 50

      regularization:
        enable: false
        mode: "relative"
        lambda: 1.0
        target_cv: 0.10
        target_contribution: 0.10
        max_cv: 0.20
        auto_tune_lambda: true

      gradient_monitoring:
        enable: true
        ratio_threshold: 0.01
        consecutive_triggers: 5
        response: "warn"

    # -----------------------------------------------------------------------
    # CMA-ES — not recommended for isotropic
    # -----------------------------------------------------------------------
    # The 3-param isotropic problem is unimodal in practice and well-scaled.
    # CMA-ES adds population-based exploration overhead with little benefit
    # for a 3-D parameter space. Toggle on only if the fit is reproducibly
    # stuck on a bad local minimum (rare for static isotropic).
    # REQUIRES: pip install "nlsq[evosax]"
    cmaes:
      enable: false                     # off by default — 3-D isotropic doesn't
                                        # need CMA-ES. REQUIRES: nlsq[evosax].
      preset: "cmaes"                   # "cmaes-fast" (50 gen) | "cmaes" (100 gen)
                                        # | "cmaes-global" (200 gen)
      max_generations: null             # null = use preset's value; int = override
      sigma: 0.5                        # initial step (fraction of bound range).
                                        # CONSTRAINT: (0, 1]
      sigma_warmstart: 0.05             # reduced sigma when warm-started
      warmstart_auto_skip: true         # true = skip CMA-ES if warm-start is good
      warmstart_skip_threshold: 5.0     # skip if warm-start red. χ² < this
      popsize: null                     # null = adaptive (recommended); int = fixed
      tol_fun: 1.0e-8                   # function-value tolerance. CONSTRAINT: > 0
      tol_x: 1.0e-8                     # parameter tolerance. CONSTRAINT: > 0
      restart_strategy: "bipop"         # "none" | "bipop" (BIPOP-CMA-ES;
                                        # alternates large/small populations on restart)
      max_restarts: 5                   # max BIPOP restarts. CONSTRAINT: >= 0
      memory_limit_gb: 8.0              # memory cap for auto-sizing. CONSTRAINT: > 0
      auto_select: true                 # true = engage when scale_ratio > scale_threshold
      scale_threshold: 1000.0           # engagement threshold on scale ratio.
                                        # CONSTRAINT: > 0
      normalize: true                   # true = bounds-based [0,1] normalization
      normalization_epsilon: 1.0e-12    # div-by-zero guard for tiny bound ranges
      refine_with_nlsq: true            # Phase 2: NLSQ-TRF local polish
      refinement_ftol: 1.0e-10          # tighter than main NLSQ
      refinement_xtol: 1.0e-10
      refinement_gtol: 1.0e-10
      refinement_max_nfev: 500          # max func-evals for refinement. CONSTRAINT: > 0
      refinement_loss: "linear"         # "linear" | "soft_l1" | "huber" |
                                        # "cauchy" | "arctan"

    # -----------------------------------------------------------------------
    # MULTI-START — usually unnecessary for isotropic
    # -----------------------------------------------------------------------
    # The 3-D parameter space is simple enough that a single well-chosen
    # initial point usually suffices. Enable multi_start with n_starts=5–10
    # only if you want LHS exploration to confirm uniqueness of the minimum.
    # DISABLE when cmaes.enable=true — they're redundant.
    multi_start:
      enable: false                       # off by default. Toggle on for LHS scan;
                                          # disable when cmaes.enable=true.
      n_starts: 5                         # # of LHS starts. CONSTRAINT: > 0
                                          # 3-D isotropic — 5-10 is plenty.
      seed: 42                            # PRNG seed. CHANGE between runs to
                                          # confirm result isn't seed-dependent.
      sampling_strategy: "latin_hypercube"  # "latin_hypercube" (recommended) | "random"
      n_workers: 0                        # 0 = auto (os.cpu_count())
                                          # 1 = sequential | >1 = explicit. CONSTRAINT: >= 0
      use_screening: true                 # true = cheap pre-filter pass before refinement
      screen_keep_fraction: 0.5           # fraction of screened starts to refine.
                                          # CONSTRAINT: (0, 1]
      refine_top_k: 3                     # tightly-refine top K. CONSTRAINT: >= 0
      refinement_ftol: 1.0e-12            # tighter than main NLSQ. CONSTRAINT: > 0
      degeneracy_threshold: 0.1           # flag starts within (1+threshold)·χ²_best
                                          # as degenerate. CONSTRAINT: (0, 1)

    # -----------------------------------------------------------------------
    # HYBRID STREAMING — auto-activates for >10M points
    # -----------------------------------------------------------------------
    # Four-phase pipeline: normalize → L-BFGS warmup → streaming Gauss-Newton
    # → denormalize. Memory bounded at ~2 GB regardless of dataset size,
    # ~10× fewer iterations than direct LM.
    # The 4-layer warmup defense (below) prevents L-BFGS divergence on
    # warm-starts from good initial guesses. Leave the defaults — they
    # have been tuned against real datasets.
    hybrid_streaming:
      enable: true                           # auto-fires for >10M points
      normalize: true                        # Phase 0 — ESSENTIAL for mixed scales
      normalization_strategy: "auto"         # "auto" | "bounds" | "p0" | "none"
      # ---- Phase 1: L-BFGS warmup ----
      warmup_iterations: 200                 # warmup iters before switch check. CONSTRAINT: > 0
      max_warmup_iterations: 500             # force-switch to GN after this. CONSTRAINT: > 0
      warmup_learning_rate: 0.001            # L-BFGS line search scale. CONSTRAINT: > 0
      # ---- Phase 2: Gauss-Newton refinement ----
      gauss_newton_max_iterations: 100       # CONSTRAINT: > 0
      gauss_newton_tol: 1.0e-8               # CONSTRAINT: > 0
      # ---- Streaming settings ----
      chunk_size: 10000                      # points per J^T J chunk. CONSTRAINT: > 0
                                             # Tune to 1000-50000 based on RAM headroom.
      trust_region_initial: 1.0              # initial trust-region radius
      regularization_factor: 1.0e-10         # Tikhonov reg for J^T J inversion.
                                             # Bump to 1e-8 if "singular matrix" warnings.
      # ---- Checkpointing ----
      enable_checkpoints: true               # true = save mid-run checkpoints
      checkpoint_frequency: 100              # save every N iters
      validate_numerics: true                # true = NaN/Inf detection per step
      verbose: 1                             # 0 = silent | 1 = progress | 2 = debug
      log_frequency: 1                       # log every N iters

      # 4-layer warmup defense (NLSQ) — keep all 4 enabled.
      # L1: skip warmup if loss is already small (well-chosen warm-start)
      # L2: scale learning rate by initial loss quality
      # L3: abort if cost increases > 5% during warmup
      # L4: clip per-iteration step to fraction of normalized range
      enable_warm_start_detection: true
      warm_start_threshold: 0.01
      enable_adaptive_warmup_lr: true
      warmup_lr_refinement: 1.0e-6
      warmup_lr_careful: 1.0e-5
      enable_cost_guard: true
      cost_increase_tolerance: 0.05
      enable_step_clipping: true
      max_warmup_step_size: 0.1

    # Post-fit quality checks; emit warnings only, never raise.
    quality_validation:
      enable: true
      reduced_chi_squared_threshold: 10.0   # warn if χ²_red > 10
      warn_on_max_restarts: true            # warn if CMA-ES hit max_restarts
      warn_on_bounds_hit: true              # warn if a param pinned at bounds
      warn_on_convergence_failure: true     # warn if optimizer didn't converge
      bounds_tolerance: 1.0e-9              # distance to bound that counts as "at"

  # Streaming checkpoint/resume — auto-engages for >100M points.
  streaming:
    enable_checkpoints: true                # mid-run checkpoints
    checkpoint_dir: "./checkpoints"         # MUST be writeable
    checkpoint_frequency: 10                # save every N BATCHES
    resume_from_checkpoint: true            # true = auto-resume from latest
    keep_last_checkpoints: 3                # # of recent checkpoints to retain
    enable_fault_tolerance: true            # true = retry failed batches
    max_retries_per_batch: 2                # max retries per batch. CONSTRAINT: >= 0
    min_success_rate: 0.5                   # overall fit fails if rate < this.
                                            # CONSTRAINT: [0, 1]
    batch_size: null                        # null = auto from memory; int = explicit
    adaptive_batching: true                 # true = dynamically size batches

  # Angle-stratified chunking — fixes per-angle scaling on large datasets.
  stratification:
    enabled: "auto"                         # "auto" (RECOMMENDED) | true | false
    target_chunk_size: 100000               # target points per chunk. CONSTRAINT: > 0
    max_imbalance_ratio: 5.0                # fall back to sequential above this.
                                            # CONSTRAINT: > 0
    force_sequential_fallback: false        # true = skip stratification entirely
    check_memory_safety: true               # true = warn if peak > 70% of RAM
    use_index_based: false                  # true = zero-copy mode (~1% overhead)
    collect_diagnostics: false              # true = collect timing + balance stats
    log_diagnostics: false                  # requires collect_diagnostics=true

  # Sequential per-angle solves — fallback when stratification fails.
  sequential:
    min_success_rate: 0.5                   # fit fails if angle success < this
                                            # CONSTRAINT: [0, 1]
    weighting: "inverse_variance"           # "inverse_variance" — optimal (default)
                                            # "uniform"          — equal weights
                                            # "n_points"         — weight by #points

  # Recovery: retry with progressively conservative settings on failure.
  recovery:
    enable: true
    max_attempts: 3                         # # of retry attempts. CONSTRAINT: >= 0
    lr_decay: 0.5                           # halve LR on each retry
    lambda_growth: 2.0                      # double regularization on each retry
    trust_decay: 0.5                        # halve trust region on each retry
    log_retries: true

  # Optimizer-layer angle filter — distinct from top-level phi_filtering.
  # Usually leave off; top-level phi_filtering is the primary filter.
  angle_filtering:
    enabled: false
    target_angle_ranges: []                 # list of {min_angle, max_angle} dicts

# -----------------------------------------------------------------------------
# NOISE ESTIMATION — Bayesian sub-tooling, disabled by default
# -----------------------------------------------------------------------------
noise_estimation:
  enabled: false
  model: "global"               # isotropic → "global" is the natural choice

# -----------------------------------------------------------------------------
# PERFORMANCE — CPU-only (no GPU; NLSQ_SKIP_GPU_CHECK=1 is set)
# -----------------------------------------------------------------------------
performance:
  strategy_override: null      # null = auto-select (RECOMMENDED)
                               # "standard"  — small  (<1M points)
                               # "large"     — 1M-10M
                               # "chunked"   — 10M-100M
                               # "streaming" — >100M
  memory_limit_gb: null        # null = auto-detect from system
                               # float = explicit GB cap (e.g. 16.0)
  enable_progress: true        # true = progress bars everywhere

  memory_optimization:
    enabled: true              # true = memory-efficient code paths
    max_memory_usage_gb: 6.0   # soft target. CONSTRAINT: > 0
    chunk_size: 8000           # default mem-aware chunk size. CONSTRAINT: > 0
    enable_caching: true       # cache intermediate arrays for re-use
    cache_strategy: "adaptive" # "adaptive" — adjust by RAM pressure (RECOMMENDED)
                               # "aggressive" — cache everything (max speed/RAM)
                               # "conservative" — minimal caching (min RAM)

  computation:
    enable_jit: true           # true = JAX JIT compile (RECOMMENDED).
                               # false = interpreter (debugging only)
    cpu_threads: "auto"        # "auto" = os.cpu_count() | int = explicit
                               # 1 = deterministic single-threaded
    vectorization_level: "high"  # "low" | "medium" | "high" (RECOMMENDED)

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  enabled: true                # true = configure logging; false = Python defaults
  level: "INFO"                # "DEBUG" | "INFO" | "WARNING" | "ERROR"
                               # Root logger level (filters everything below)

  console:
    enabled: true              # true = log to stderr
    level: "INFO"              # console-specific level (can be more restrictive)
    format: "detailed"         # "simple"   — "LEVEL: message"
                               # "detailed" — "TIMESTAMP NAME LEVEL: message"
    colors: true               # true = colorize levels (off automatically if no tty)
    show_progress: true        # true = render tqdm bars in console

  file:
    enabled: false             # true = also log to rotating file
    level: "DEBUG"             # file-specific level (DEBUG to capture everything)
    path: "./logs/"            # log directory (created if missing)
    filename: "xpcsjax_static_isotropic.log"
    max_size_mb: 10            # rotate when file exceeds this. CONSTRAINT: > 0
    backup_count: 5            # # of rotated backups. CONSTRAINT: >= 0

  modules:                     # per-module level overrides
    "xpcsjax.data.phi_filtering": "INFO"
    "xpcsjax.data.xpcs_loader":   "INFO"
    "xpcsjax.optimization.nlsq":  "INFO"
    "jax._src":                   "WARNING"    # suppress JAX internal chatter

# -----------------------------------------------------------------------------
# QUALITY CONTROL
# -----------------------------------------------------------------------------
quality_control:
  enabled: false

  angle_quality:
    validate_angle_coverage: false   # isotropic doesn't depend on coverage
    min_angles_per_range: 1
    check_angle_distribution: false

  multi_angle_validation:
    check_correlation_consistency: false
    validate_angle_dependencies: false
    detect_anomalous_angles: true

# -----------------------------------------------------------------------------
# PLOTTING — visualization output (xpcsjax.viz)
# -----------------------------------------------------------------------------
plotting:
  save_plots: true               # true = write plots to output.directory
  show_plots: false              # true = open interactive windows (off in CI)
  format: "png"                  # "png" (raster) | "pdf" (vector) | "svg" (editable)
  dpi: 300                       # 150 draft | 300 publication | 600 print. CONSTRAINT: > 0
  style: "publication"           # "publication" | "draft"

  preview_mode: false            # false = matplotlib (default)
                                 # true  = datashader (for huge c2 arrays)
  fit_surface: "solver"          # "solver"  — use optimizer's params (faster)
                                 # "posthoc" — re-evaluate on fresh grid (more accurate)

  color_scale:
    mode: "legacy"               # "legacy"   — fixed range (fixed_min/max)
                                 # "adaptive" — data percentile (percentile_min/max)
    pin_legacy_range: true       # true = clamp to fixed range across datasets
    percentile_min: 1.0          # adaptive lower [0, 100]. CONSTRAINT: < max
    percentile_max: 99.0         # adaptive upper [0, 100]. CONSTRAINT: > min
    fixed_min: 1.0               # legacy lower (c2 value)
    fixed_max: 1.5               # legacy upper (c2 value)

  datashader:                    # only used when preview_mode: true
    canvas_width: 1200           # pixels. CONSTRAINT: > 0
    canvas_height: 1200          # pixels. CONSTRAINT: > 0

  matplotlib:                    # only used when preview_mode: false
    interpolation: "bilinear"    # "none" (sharp) | "bilinear" (default) | "bicubic"
    use_tight_layout: true       # true = tight_layout (RECOMMENDED)
    savefig_kwargs:              # passed directly to plt.savefig()
      bbox_inches: "tight"
      pad_inches: 0.1

  # ---- Plot types to generate ----
  correlation_function: true     # c2(t1, t2) heatmap (per angle)
  fit_quality: true              # data-vs-fit overlay + residuals
  residual_analysis: true        # residual histograms + QQ plots
  angle_coverage: false          # off — isotropic doesn't depend on coverage
  angle_correlation: false       # off — isotropic has no angular structure

# -----------------------------------------------------------------------------
# OUTPUT — where to write results
# -----------------------------------------------------------------------------
output:
  directory: "./results"                # results subdir under base_directory
  base_directory: "./xpcsjax_results/"  # top-level results directory; created if missing

  formats:                              # enable multiple as needed
    hdf5: true                          # .h5  — best for large arrays + metadata
    json: true                          # .json — human-readable summary
    csv: true                           # .csv — plain text, spreadsheet-ready
    yaml: true                          # .yaml — config + result snapshot
    npz: true                           # .npz — numpy archive for re-loading

  create_subdirs: true                  # true = per-method subdirectories
  timestamp_dirs: false                 # true = append timestamp to result dirs

  compress_hdf5: true                   # gzip HDF5 datasets
  compression_level: 6                  # 0-9 (0 none | 6 balanced | 9 max)
  include_diagnostics: true             # include diagnostic blocks in output

# -----------------------------------------------------------------------------
# VALIDATION — pre-run config sanity checks
# -----------------------------------------------------------------------------
validation:
  strict_mode: false                  # false = log warnings (RECOMMENDED)
                                      # true  = raise on first warning (CI-safe)
  check_file_existence: true          # true = verify files exist before starting
  validate_parameter_ranges: true     # true = check initial values fall within bounds
  check_mode_compatibility: true      # true = warn on mode-specific config mismatches

  angle_validation:
    require_multiple_angles: false    # false for isotropic — single angle works
    min_angle_count: 1                # required when require_multiple_angles=true
                                      # CONSTRAINT: >= 1
    validate_angle_ranges: false      # false — isotropic ignores phi structure
