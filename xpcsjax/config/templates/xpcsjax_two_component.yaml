# =============================================================================
# xpcsjax — TWO-COMPONENT (HETERODYNE) TEMPLATE
# =============================================================================
# Fourteen-parameter heterodyne model. Use this template when the scattering
# signal is a mixture of a reference beam (known scatterer) and a sample
# beam (unknown scatterer), with a relative velocity between them. This is
# the standard model for heterodyne XPCS, microfluidic two-phase flow, and
# experiments with a stationary reference target.
#
# Physics model:
#   g1_r(t)   = exp(−q² · [D0_ref·t^alpha_ref + D_offset_ref])     [reference]
#   g1_s(t)   = exp(−q² · [D0_sample·t^alpha_sample + D_offset_sample])
#   v(t)      = v0 · t^v_beta + v_offset                            [flow]
#   f_s(t)    = clip(f0·exp(f1·(t−f2)) + f3, 0, 1)                  [sample fraction]
#   c2 has reference + sample + cross terms, modulated by phi0_het.
#
# Parameters (14 physical + 2N scaling for N phi angles):
#   Reference transport (3):  D0_ref, alpha_ref, D_offset_ref
#   Sample transport (3):     D0_sample, alpha_sample, D_offset_sample
#   Velocity (3):             v0, v_beta, v_offset
#   Fraction (4):             f0, f1, f2, f3
#   Flow angle (1):           phi0_het              [DEGREES, [−10, 10]]
#   Per-angle scaling (2N):   contrast_i, offset_i
#
# Critical naming notes (xpcsjax registry IS the source of truth):
#   * `v_beta` — NOT `beta`. The xpcsjax registry renames the heterodyne
#     velocity exponent to `v_beta` to disambiguate from the homodyne shear
#     `beta`. Upstream heterodyne docs call it `beta`; do not use that name
#     here — `xpcsjax.config.parameter_registry._MODE_PARAMS["two_component"]`
#     requires `v_beta`.
#   * `phi0_het` — NOT `phi0`. The name disambiguates the heterodyne flow angle
#     from the homodyne `phi0`, but both share the same unit and bounds:
#     DEGREES over [−10°, 10°] (kernel computes deg2rad(phi_angle + phi0_het)).
#
# Per-angle modes (from anti_degeneracy.per_angle_mode):
#   constant:   per-angle (β, o) frozen from quantile — 14 physics only
#   auto:       quantile (β, o) averaged then optimized jointly — 16 params
#   fourier:    (β, o) as truncated Fourier series — 14 + 2·(2K+1)
#   individual: independent per-angle (β_k, o_k) — 14 + 2·N_phi
#
# Scope: xpcsjax is NLSQ-only. Bayesian sampling is permanently out of scope.
# =============================================================================

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------
metadata:
  config_version: "0.1.0"
  description: "xpcsjax two-component (heterodyne) — 14-param reference+sample+velocity+fraction"
  parameter_count: 14
  physics_model: "heterodyne: g1_ref + g1_sample + cross-term with v(t), f_s(t), phi0_het"
  template_type: "production_ready"
  complexity: "advanced"
  generated_at: null
  generated_by: null

# -----------------------------------------------------------------------------
# ANALYSIS MODE
# -----------------------------------------------------------------------------
# Canonical: "two_component". The synonyms "heterodyne" and "two-component"
# are normalized to "two_component" by ConfigManager._normalize_analysis_mode().
analysis_mode: "two_component"

# -----------------------------------------------------------------------------
# ANALYZER PARAMETERS
# -----------------------------------------------------------------------------
analyzer_parameters:
  dt: 0.1                               # Time step [seconds]. MUST be > 0.
                                        # For heterodyne, dt must resolve the
                                        # cross-term oscillation period. Wrong dt
                                        # → wrong D0_ref, D0_sample, AND v0.
  start_frame: 1                        # First frame, 1-INDEXED. MUST be >= 1.
                                        # Skip beam-on transients.
  end_frame: 1000                       # Last frame, INCLUSIVE. MUST be > start_frame.
                                        # ⚠ -1 sentinel REJECTED — resolve absolute first.
  frame_step: 1                         # 1 = use all (RECOMMENDED for heterodyne).
                                        # >1 = subsample for exploration.
  time_unit: "seconds"                  # "seconds" — internal math assumes SI.

  scattering:
    wavevector_q: 0.0237                # Wave-vector magnitude [Å⁻¹]. MUST be > 0.
                                        # q = 4π/λ · sin(θ/2). Wrong q → wrong D0
                                        # for both reference AND sample components.

  geometry:
    stator_rotor_gap: 2000000           # Cross-term path length [Å].
                                        # For heterodyne, this enters the cross-term
                                        # phase factor integration. Set physically
                                        # accurately (here 200 µm = 2×10⁶ Å).

# -----------------------------------------------------------------------------
# ANALYSIS SETTINGS
# -----------------------------------------------------------------------------
analysis_settings:
  model_description:
    type: "two_component"
    parameters:
      - "D0_ref"
      - "alpha_ref"
      - "D_offset_ref"
      - "D0_sample"
      - "alpha_sample"
      - "D_offset_sample"
      - "v0"
      - "v_beta"          # NOT "beta"
      - "v_offset"
      - "f0"
      - "f1"
      - "f2"
      - "f3"
      - "phi0_het"        # NOT "phi0"
    physics: "Heterodyne: g1_ref + g1_sample + cross-term modulated by v(t), f_s(t), phi0_het"
    per_angle_scaling: true

# -----------------------------------------------------------------------------
# EXPERIMENTAL DATA
# -----------------------------------------------------------------------------
experimental_data:
  file_path: null                    # Modern: full path to data file (null = legacy)
  data_folder_path: "./data/"        # Legacy: directory containing data file
  data_file_name: "sample_heterodyne.hdf"  # Legacy: file basename.
                                     # Extension drives loader path:
                                     # .h5/.hdf/.hdf5/.nexus → HDF5 | .npz → cache
  phi_angles_path: "./data/"         # Directory of phi-angles file
  phi_angles_file: "phi_list.txt"    # Plain text, one phi per line, DEGREES.
                                     # Note: the in-file phi list is in DEGREES;
                                     # the heterodyne fit converts to RADIANS
                                     # internally for phi0_het comparison.

  cache_directory: "./cache"         # Where to read/write npz caches. MUST be writeable.
  use_caching: true                  # true = use cache (RECOMMENDED).
  cache_filename_template: "cached_c2_frames_${start_frame}_${end_frame}.npz"
  cache_compression: true            # true = gzip cache (smaller).

  # ⚠ data_type / file_format / exchange_key below are
  # INFORMATIONAL ONLY — NOT CONSULTED by the loader in xpcsjax v0.1.
  # See the static_anisotropic template for the full explanation.
  data_type: "aps_old"               # NOT CONSULTED. Auto-detected as "aps_old"
                                     # | "aps_u" | "unknown" from HDF5 structure.
  file_format: "hdf5"                # NOT CONSULTED. Loader routes by FILE EXTENSION:
                                     # .npz → cache | .h5/.hdf/.hdf5/.nexus → HDF5
  exchange_key: "exchange"           # NOT CONSULTED. APS-old reader hardcodes
                                     # "exchange/C2T_all"; this value is ignored.

# -----------------------------------------------------------------------------
# PHI FILTERING
# -----------------------------------------------------------------------------
# Heterodyne benefits from broad phi coverage so the cross-term modulation
# can be resolved across angles. Defaults pick parallel + perpendicular.
phi_filtering:
  enabled: true                          # true = apply filter; false = pass all
  target_ranges:                         # DEGREES; broad coverage helps the
                                         # cross-term cos(phi−phi0_het) sampling.
    - min_angle: -10.0
      max_angle:  10.0
      description: "Parallel to flow (sees full cross-term)"
    - min_angle:  85.0
      max_angle:  95.0
      description: "Perpendicular (sees only diffusion contributions)"
  fallback_to_all_angles: true           # true = use all angles if filter empties
  algorithm: "range_based"               # only "range_based" supported in v0.1
  tolerance: 3.0                         # slack [degrees] around range edges

  quality_control:
    min_angles_required: 2               # ≥2 for heterodyne — cross-term needs
                                         # both phi0-aligned and orthogonal angles.
                                         # CONSTRAINT: >= 1
    max_angle_spread: 36.0               # max spread within each range. CONSTRAINT: > 0
    validate_coverage: true              # true = warn if any range has no angles
    require_orthogonal_angles: false     # NOT required for heterodyne (the cross-term
                                         # is a phase factor, not a sign-flip like
                                         # the homodyne shear gradient — orthogonality
                                         # helps but isn't critical).

# -----------------------------------------------------------------------------
# INITIAL PARAMETERS
# -----------------------------------------------------------------------------
# parameter_names MUST match xpcsjax.config.parameter_registry._MODE_PARAMS
# for "two_component" — note `v_beta` (not `beta`) and `phi0_het` (not `phi0`).
initial_parameters:
  parameter_names:
    - D0_ref
    - alpha_ref
    - D_offset_ref
    - D0_sample
    - alpha_sample
    - D_offset_sample
    - v0
    - v_beta
    - v_offset
    - f0
    - f1
    - f2
    - f3
    - phi0_het

  values: null
  # Example (registry defaults):
  # [10000.0, 0.0, 0.0, 10000.0, 0.0, 0.0, 1000.0, 1.0, 0.0,
  #  0.5, 0.0, 0.0, 0.0, 0.0]
  #
  # ┌─────────────── PHYSICS BY PARAMETER GROUP ───────────────────────────┐
  #
  # REFERENCE TRANSPORT — J_r(t) = D0_ref · t^alpha_ref + D_offset_ref
  #   Models the *reference* beam scatterer dynamics (typically a known
  #   colloidal standard or a stationary scattering medium).
  #     g1_r(t) = exp(−q² · J_r(t))
  #   For a TRULY STATIC reference: fix all three to zero
  #     fixed_parameters: {"D0_ref": 0.0, "alpha_ref": 0.0, "D_offset_ref": 0.0}
  #
  # SAMPLE TRANSPORT — J_s(t) = D0_sample · t^alpha_sample + D_offset_sample
  #   Models the *sample* (the unknown system under study). These are the
  #   primary scientific parameters of interest.
  #     g1_s(t) = exp(−q² · J_s(t))
  #   alpha interpretation (same for ref/sample):
  #     α = 1   normal Brownian diffusion, MSD ∝ t
  #     α < 1   subdiffusion (crowding, jamming, glassy)
  #     α > 1   superdiffusion (active transport, convection)
  #     α = 0   J(t) = D0 (constant, no time dependence)
  #
  # VELOCITY FIELD — v(t) = v0 · t^v_beta + v_offset
  #   Relative velocity between reference and sample beams. Enters the
  #   cross-term as a phase factor:
  #     exp(i · q · cos(phi − phi0_het) · ∫ v(t') dt')
  #   For CONSTANT VELOCITY (most common case): set v_beta=0, then
  #     v(t) = v0 + v_offset
  #   For flow reversal: v_offset can be negative.
  #   ⚠  NAMING: xpcsjax uses `v_beta` (NOT `beta`) to disambiguate from
  #              the homodyne shear `beta`. Don't try to use `beta` here.
  #
  # SAMPLE FRACTION — f_s(t) = clip(f0·exp(f1·(t−f2)) + f3, 0, 1)
  #   Time-dependent relative scattering power of sample vs reference.
  #     f_r(t) = 1 − f_s(t)
  #   For CONSTANT FRACTION (most common): set f1=f2=f3=0, then f_s(t) = f0
  #     fixed_parameters: {"f1": 0.0, "f2": 0.0, "f3": 0.0}
  #   Use the time-dependent form for drying, sedimentation, or flow
  #   displacement experiments where the sample fraction evolves.
  #   ⚠  In xpcsjax all four fraction params are dimensionless and bounded
  #      to [-1, 1] (registry choice). The upstream heterodyne template uses
  #      different unit conventions; xpcsjax registry is authoritative here.
  #
  # FLOW ANGLE — phi0_het (DEGREES)
  #   Angle between q-vector and flow direction, in cross-term phase factor.
  #   ⚠  NAMING: xpcsjax uses `phi0_het` (DEGREES, [-10, 10]). The name differs
  #              from the homodyne `phi0` to avoid collision, but the unit and
  #              bounds match (degrees, [-10°, 10°]).
  #   For well-aligned experiments, phi0_het ≈ 0. Widen bounds in the
  #   parameter_space block if you suspect significant misalignment.
  # └──────────────────────────────────────────────────────────────────────┘

  per_angle_scaling:
    contrast: null
    offset:   null

  units:
    - "Å²/s"
    - "dimensionless"
    - "Å²/s"
    - "Å²/s"
    - "dimensionless"
    - "Å²/s"
    - "Å/s"           # velocity prefactor
    - "dimensionless" # v_beta — velocity time exponent
    - "Å/s"
    - "dimensionless"
    - "dimensionless"
    - "dimensionless"
    - "dimensionless"
    - "degrees"       # phi0_het uses degrees, same unit as homodyne phi0

  active_parameters: null
  # Frequent simplification (constant-velocity, constant-fraction):
  # fixed_parameters: {"v_beta": 0.0, "v_offset": 0.0, "f1": 0.0, "f2": 0.0, "f3": 0.0}
  fixed_parameters: null

# -----------------------------------------------------------------------------
# PARAMETER SPACE — bounds match the xpcsjax registry (NOT upstream heterodyne)
# -----------------------------------------------------------------------------
# IMPORTANT: These bounds come from xpcsjax.config.parameter_registry._PARAMETERS.
# Several differ from the upstream heterodyne template — examples:
#   * v0 upper:        xpcsjax 1e6           vs upstream 1e4
#   * f1 bounds:       xpcsjax [-1, 1] (dim) vs upstream [-10, 10] s⁻¹
#   * f2 bounds:       xpcsjax [-1, 1] (dim) vs upstream [-1e4, 1e4] s
#   * phi0_het bounds: xpcsjax [-10, 10] deg  ==  upstream [-10, 10] deg (phi0)
# The xpcsjax registry is authoritative — the upstream YAML is a reference,
# not a constraint.
parameter_space:
  model: "two_component"          # informational — mirrors analysis_mode
  bounds:
    - name: contrast
      min: 0.0                # physical lower bound (no contrast → no signal)
      max: 1.0                # physical upper bound (fully coherent)
      type: TruncatedNormal
      unit: "dimensionless"
      # Tighten to [0.01, 0.3] if you have a coherent-fraction estimate.

    - name: offset
      min: 0.5                # baseline ~1.0 for ideal normalization
      max: 1.5                # >1.5 suggests normalization issue
      type: TruncatedNormal
      unit: "dimensionless"
      # Tighten to [0.95, 1.05] if normalization is well-validated.

    # ----- Reference transport (3) — J_r(t) = D0_ref · t^alpha_ref + D_offset_ref -----
    - name: D0_ref
      min: 0.0                # physical floor (static reference: D0_ref = 0)
      max: 1000000.0          # wide upper for unknown reference dynamics
      type: TruncatedNormal
      unit: "Å²/s"
      # For a TRULY STATIC reference: fix to 0 via fixed_parameters.
      # For a known colloidal-standard reference: tighten to ±2× the
      # expected D from Stokes-Einstein.

    - name: alpha_ref
      min: -2.0               # strong subdiffusion
      max:  2.0               # strong superdiffusion
      type: TruncatedNormal
      unit: "dimensionless"
      # α = 1   normal Brownian diffusion
      # α < 1   subdiffusion (crowded, glassy)
      # α > 1   superdiffusion (active, ballistic)
      # α = 0   constant J(t) = D0_ref (no time dependence)

    - name: D_offset_ref
      min: -10000.0           # negative rare; usually indicates arrested dynamics
      max:  10000.0           # symmetric for safety
      type: TruncatedNormal
      unit: "Å²/s"
      # Most heterodyne fits give D_offset_ref ≈ 0. Common simplification:
      # fixed_parameters: {"D_offset_ref": 0.0}

    # ----- Sample transport (3) — J_s(t) = D0_sample · t^alpha_sample + D_offset_sample -----
    - name: D0_sample
      min: 0.0                # physical floor
      max: 1000000.0          # wide upper for unknown sample dynamics
      type: TruncatedNormal
      unit: "Å²/s"
      # PRIMARY scientific parameter. Tighten to ±2× expected from
      # particle size if known.

    - name: alpha_sample
      min: -2.0
      max:  2.0
      type: TruncatedNormal
      unit: "dimensionless"
      # Same interpretation as alpha_ref. PRIMARY scientific parameter.

    - name: D_offset_sample
      min: -10000.0
      max:  10000.0
      type: TruncatedNormal
      unit: "Å²/s"
      # Most fits give D_offset_sample ≈ 0. Tighten or freeze if you have
      # no reason to model it.

    # ----- Velocity (3) — v(t) = v0 · t^v_beta + v_offset -----
    - name: v0                # ⚠ NAMING: v0 is the velocity amplitude.
      min: 0.0                # physical floor
      max: 1000000.0          # wide upper covers typical XPCS flow rates
      type: TruncatedNormal
      unit: "Å/s"
      # Convert from other units: µm/s × 1e4 = Å/s; nm/s × 10 = Å/s.
      # Typical XPCS velocities: 10–10000 Å/s. Tighten if you know flow rate.

    - name: v_beta            # ⚠ NAMING TRAP: this is v_beta (NOT `beta`).
                              # `beta` is the homodyne SHEAR exponent.
      min: 0.0                # decelerating to zero velocity
      max: 2.0                # accelerating up to 2nd-order time dependence
      type: TruncatedNormal
      unit: "dimensionless"
      # v_beta = 0   CONSTANT velocity v(t) = v0 + v_offset (MOST COMMON)
      # v_beta = 1   linear-in-t velocity (startup flow)
      # v_beta > 1   accelerating (thickening, shear-thickening fluids)
      # Common simplification for steady flow:
      # fixed_parameters: {"v_beta": 0.0}

    - name: v_offset
      min: -100.0             # allow flow reversal
      max:  100.0
      type: TruncatedNormal
      unit: "Å/s"
      # Most fits give v_offset ≈ 0. Use to model flow direction reversal
      # (e.g., oscillatory rheology).

    # ----- Fraction (4) — f_s(t) = clip(f0 · exp(f1·(t−f2)) + f3, 0, 1) -----
    - name: f0                # AMPLITUDE of the sample fraction
      min: 0.0                # 0 = pure reference beam
      max: 1.0                # 1 = pure sample beam
      type: TruncatedNormal
      unit: "dimensionless"
      # f0 = 0.5  equal reference/sample (typical starting point)
      # f0 → 0    reference-dominated (weak sample scattering)
      # f0 → 1    sample-dominated (weak reference)

    - name: f1                # EXPONENTIAL RATE of fraction evolution
      min: -1.0               # decreasing fraction (sample fading)
      max:  1.0               # increasing fraction (sample growing)
      type: TruncatedNormal
      unit: "dimensionless"
      # f1 = 0    CONSTANT fraction (most common simplification)
      # f1 > 0    sample fraction grows exponentially
      # f1 < 0    sample fraction decays exponentially
      # Common simplification: fixed_parameters: {"f1": 0.0}

    - name: f2                # TIME SHIFT for the exponential onset
      min: -1.0
      max:  1.0
      type: TruncatedNormal
      unit: "dimensionless"
      # Often set to mid-experiment time if you model time-varying fraction.
      # Common simplification: fixed_parameters: {"f2": 0.0}

    - name: f3                # BASELINE offset of the fraction
      min: -1.0
      max:  1.0
      type: TruncatedNormal
      unit: "dimensionless"
      # Most fits give f3 ≈ 0. Common simplification:
      # fixed_parameters: {"f3": 0.0}

    # ----- Flow angle (heterodyne convention: DEGREES, same unit as phi0) -----
    - name: phi0_het          # ⚠ NAMING TRAP: phi0_het (NOT phi0).
                              # phi0 is the homodyne flow angle; phi0_het is the
                              # heterodyne flow angle. Both are in DEGREES — the
                              # kernel computes deg2rad(phi_angle + phi0_het).
      min: -10.0   # degrees (matches upstream phi0 bounds)
      max:  10.0   # degrees
      type: TruncatedNormal
      unit: "degrees"
      # phi0_het = 0  flow aligned with detector primary axis (RECOMMENDED start)
      # Tighten to [-2, 2] if alignment is well-known.

# -----------------------------------------------------------------------------
# OPTIMIZATION (NLSQ-only) — two_component tuning
# -----------------------------------------------------------------------------
# Two-component (heterodyne) is the highest-dimensional case xpcsjax supports
# (14 physical params + 2·N_phi scaling). The natural scale ratio across
# parameters is large (D0 ~ 1e4 vs f0 ~ 1e-1, ratio ~1e5+), so:
#   * CMA-ES auto-engagement is the norm — leave auto_select on
#   * Multi-start is disabled (would be redundant with CMA-ES)
#   * x_scale_map is dataset-specific and worth computing
#
# Strategy selection (AUTOMATIC):
#   < 1M  → STANDARD          1M–10M  → LARGE
#   10M–100M → CHUNKED        > 100M  → HYBRID_STREAMING
#
# Loss function:
#   "linear"   Clean data                          (fastest)
#   "soft_l1"  Typical XPCS data                   (RECOMMENDED) ⭐
#   "huber"    Few outliers                        (hybrid)
#   "cauchy"   Severe outlier contamination        (heavy-tail robust)
#
# Convergence: bump max_iterations to 20k–30k for very wide bounds or when
# CMA-ES is doing the heavy lifting (Phase 1 can take many iterations).
optimization:
  method: "nlsq"

  nlsq:
    workflow: "auto"
    goal: "quality"

    memory_fraction: 0.75

    max_iterations: 10000
    tolerance: 1.0e-8
    xtol: 1.0e-8
    gtol: 1.0e-8
    trust_region_scale: 1.0
    verbose: false

    loss: "soft_l1"

    # ----------------------------------------------------------------------
    # PARAMETER SCALING — STRONGLY recommended to compute x_scale_map for
    # heterodyne. With 14 parameters spanning ~1e5 in scale, "jac" often
    # leaves several params under-optimized. Run after a first NLSQ fit:
    #   python scripts/diagnose_gradients.py --results-dir ./xpcsjax_results
    # Then paste the output below as x_scale_map.
    # ----------------------------------------------------------------------
    x_scale: "jac"
    x_scale_map: null
    # Two-component scale_map is dataset-specific — use diagnose_gradients.py.

    progress:
      enable: true                # true = tqdm progress bar; false = silent
      verbose: 1                  # 0 = silent | 1 = milestones | 2 = per-iter
      log_interval: 10            # log every N iters (with verbose >= 2)

    # ----------------------------------------------------------------------
    # DIAGNOSTICS — STRONGLY recommended for first heterodyne fits.
    # The 14-D parameter space has many local minima; gradient checks
    # surface issues early.
    # ----------------------------------------------------------------------
    diagnostics:
      enabled: false              # toggle on for first 14-D fits
      sample_size: 2048           # # points for gradient check. CONSTRAINT: > 0
      check_gradients: true       # true = numerical vs analytic gradient comparison
      log_jacobian_norms: false   # true = log column-wise J norms (input to
                                  # diagnose_gradients.py for x_scale_map)

    # ----------------------------------------------------------------------
    # ANTI-DEGENERACY DEFENSE SYSTEM — 4-LAYER (heterodyne)
    # ----------------------------------------------------------------------
    # Heterodyne uses a 4-layer defense (L1–L4). L5 shear-weighting from
    # the homodyne stack is intentionally OMITTED — see the explanation
    # in docs/source/theory/heterodyne_anti_degeneracy.rst:
    #   In heterodyne, the cross-term oscillation comes from v(t), NOT
    #   from a shear-rate γ̇·cos(phi−phi0). The angular pattern that L5
    #   weights against (gradient sign-flip from shear) does not appear
    #   in the same form in the heterodyne residual structure.
    # If you need to deeply suppress per-angle scaling absorption beyond
    # L1–L4, enable L3 adaptive regularization below.
    #
    # PER-ANGLE MODE — controls how (contrast, offset) varies with angle:
    #   "constant"    per-angle (β, o) FROZEN from quantile estimate  →  14
    #                 (optimizer fits the 14 physics only)
    #   "auto"        quantile (β, o) averaged + jointly optimized    →  16
    #                 (auto-selects when n_phi >= constant_scaling_threshold)
    #   "fourier"     (β, o) as truncated Fourier series              →  14 + 2·(2K+1)
    #   "individual"  independent per-angle (β_k, o_k), optimized     →  14 + 2·n_phi
    #
    # Parameter count examples (n_phi=10, fourier_order=2):
    #   constant:    14 params (β, o frozen per-angle)
    #   auto:        16 params (14 + 2 averaged scaling)
    #   fourier:     24 params (14 + 10 Fourier coeffs)
    #   individual:  34 params (14 + 20 per-angle scaling — prone to absorption)
    #
    # DEPRECATION: "independent" is a deprecated alias for "individual" and
    # will be removed in heterodyne v1.0; xpcsjax follows the same convention.
    anti_degeneracy:
      enable: true

      per_angle_mode: "auto"
      constant_scaling_threshold: 3
      fourier_order: 2
      fourier_auto_threshold: 6

      # ---- L2 Hierarchical (alternating physical / per-angle solves) ----
      # Recommended for heterodyne — the 14-D physics block benefits from
      # being optimized with scaling frozen, then scaling alone, alternating.
      hierarchical:
        enable: true                    # recommended for heterodyne
        max_outer_iterations: 5
        outer_tolerance: 1.0e-6
        physical_max_iterations: 100
        per_angle_max_iterations: 50

      # ---- L3 Adaptive Regularization ----
      # Off by default. Enable if per-angle scaling is absorbing the
      # cross-term oscillations and L2 alone cannot recover them.
      regularization:
        enable: false
        mode: "relative"                # "absolute" | "relative" | "auto"
        lambda: 1.0
        target_cv: 0.10
        target_contribution: 0.10
        max_cv: 0.20
        auto_tune_lambda: true

      # ---- L4 Gradient-Collapse Detection ----
      # For heterodyne, response="hierarchical" auto-switches to the L2
      # alternating solver on gradient collapse (most common recovery).
      gradient_monitoring:
        enable: true
        ratio_threshold: 0.01
        consecutive_triggers: 5
        response: "hierarchical"        # "warn" | "hierarchical" | "reset" | "abort"

      # NOTE: L5 shear_weighting is gated to laminar_flow ONLY (see
      # _LAYER_GATES in anti_degeneracy_controller.py). It is hard-blocked for
      # two_component — heterodyne's velocity/flow term (v0, v_offset, phi0_het)
      # is structurally different from laminar_flow's shear rate, so the
      # |cos(phi0-phi)| weighting does not transfer. Even setting
      # shear_weighting.enable here has no effect.
      # See docs/source/theory/heterodyne_anti_degeneracy.rst.

    # ----------------------------------------------------------------------
    # CMA-ES GLOBAL OPTIMIZATION — strongly recommended for heterodyne
    # ----------------------------------------------------------------------
    # The 14-D heterodyne parameter space is the canonical "use CMA-ES"
    # case in xpcsjax:
    #   * scale_ratio is routinely 1e5–1e7 (D0_ref vs f0)
    #   * Multiple local minima exist (degenerate fits between reference
    #     transport, sample transport, and velocity contributions)
    #   * NLSQ alone often converges to a poor basin without good warm-start
    #
    # WHEN TO ENABLE:
    #   * First exploration of a new dataset
    #   * NLSQ converges but the fit quality is suspiciously bad
    #   * You want to confirm uniqueness of the converged minimum
    #
    # TWO-PHASE ARCHITECTURE:
    #   Phase 1: CMA-ES Global Search (BIPOP restarts, covariance adaptation)
    #   Phase 2: NLSQ-TRF Refinement (tighter tolerances, refine_with_nlsq)
    #
    # PRESETS:
    #   "cmaes-fast"    50 gen  — quick exploration only
    #   "cmaes"         100 gen — balanced
    #   "cmaes-global"  200 gen — thorough (RECOMMENDED for 14-D heterodyne)
    #
    # REQUIRES: pip install "nlsq[evosax]"
    cmaes:
      enable: false                       # toggle on when NLSQ alone finds
                                          # inconsistent minima (likely for 14-D
                                          # heterodyne). REQUIRES: nlsq[evosax]
      preset: "cmaes-global"              # "cmaes-fast" (50 gen) | "cmaes" (100 gen)
                                          # | "cmaes-global" (200 gen, RECOMMENDED for 14-D)
      max_generations: null               # null = adaptive (RECOMMENDED for heterodyne;
                                          # 14-D needs many generations)
      sigma: 0.5                          # initial step (fraction of bound range).
                                          # CONSTRAINT: (0, 1]
                                          # 0.5 = half range; larger = more exploration.
      sigma_warmstart: 0.05               # reduced sigma when warm-started from NLSQ.
                                          # CONSTRAINT: (0, 1]
      warmstart_auto_skip: true           # true = skip CMA-ES if warm-start good
      warmstart_skip_threshold: 5.0       # skip if warm-start red. χ² < this.
                                          # CONSTRAINT: > 0
      popsize: null                       # null = adaptive (RECOMMENDED for 14-D;
                                          # gives 200+ for scale_ratio > 1e6)
      tol_fun: 1.0e-8                     # function-value tolerance. CONSTRAINT: > 0
      tol_x: 1.0e-8                       # parameter tolerance. CONSTRAINT: > 0
      restart_strategy: "bipop"           # "none" | "bipop" (BIPOP-CMA-ES; RECOMMENDED
                                          # for 14-D — alternates large/small populations)
      max_restarts: 10                    # max BIPOP restarts. CONSTRAINT: >= 0
                                          # 14-D often needs more restarts than 3-D static.
      memory_limit_gb: 8.0                # cap for auto-sizing. CONSTRAINT: > 0
      auto_select: true                   # ⚠ For 14-D heterodyne, auto-engagement is
                                          # the NORM — scale_ratio routinely > 1e5.
      scale_threshold: 1000.0             # engagement threshold. CONSTRAINT: > 0
      normalize: true                     # ESSENTIAL for heterodyne — keeps CMA-ES
                                          # from being dominated by the D0 scale.
      normalization_epsilon: 1.0e-12      # div-by-zero guard
      refine_with_nlsq: true              # Phase 2: NLSQ-TRF local polish (RECOMMENDED)
      refinement_ftol: 1.0e-10            # tighter than main NLSQ. CONSTRAINT: > 0
      refinement_xtol: 1.0e-10
      refinement_gtol: 1.0e-10
      refinement_max_nfev: 500            # max func-evals for refinement. CONSTRAINT: > 0
      refinement_loss: "linear"           # "linear" (default) | "soft_l1" | "huber"
                                          # | "cauchy" | "arctan"

    # ----------------------------------------------------------------------
    # MULTI-START OPTIMIZATION  (wired for heterodyne as of 2026-05-27)
    # ----------------------------------------------------------------------
    # When enable=true and cmaes.enable=false, each LHS start re-runs the FULL
    # joint multi-phi fit; the best basin is then re-fit once for the final
    # result. CMA-ES keeps precedence when both are enabled (they're redundant).
    # For 14-D heterodyne, bump n_starts to 15–30 to cover the parameter box.
    # NOTE: heterodyne multi-start runs SEQUENTIALLY — n_workers is ignored (the
    # JAX model is not process-picklable; parallel heterodyne multi-start is a
    # follow-up).
    multi_start:
      enable: false                       # OFF when cmaes.enable=true.
                                          # Use standalone only if you have a reason
                                          # to avoid CMA-ES (e.g., evosax not installed).
      n_starts: 15                        # # of LHS starts. CONSTRAINT: > 0.
                                          # 14-D heterodyne needs 15-50 starts to
                                          # adequately sample the parameter box.
                                          # Doubling n_starts ≈ doubles compute.
      seed: 42                            # PRNG seed. CHANGE between runs to confirm
                                          # the result isn't seed-dependent.
      sampling_strategy: "latin_hypercube"  # "latin_hypercube" (RECOMMENDED) | "random"
      n_workers: 0                        # IGNORED for heterodyne (always sequential).
                                          # CONSTRAINT: >= 0
      use_screening: true                 # true = cheap filter pass before refinement
      screen_keep_fraction: 0.5           # fraction of starts to refine.
                                          # CONSTRAINT: (0, 1]
      refine_top_k: 3                     # tightly-refine top K. CONSTRAINT: >= 0
      refinement_ftol: 1.0e-12            # tighter than main NLSQ. CONSTRAINT: > 0
      degeneracy_threshold: 0.1           # flag starts within (1+threshold)·χ²_best
                                          # CONSTRAINT: (0, 1). For heterodyne,
                                          # degenerate fits are common — keep this on.

    # ----------------------------------------------------------------------
    # HYBRID STREAMING — large-dataset optimizer  (wired for heterodyne 2026-05-27)
    # ----------------------------------------------------------------------
    # Routes the heterodyne JOINT fit through NLSQ's AdaptiveHybridStreamingOptimizer
    # via a pointwise model over scattered (phi, t1, t2) points with per-angle
    # scaling fixed from quantiles. Phases: normalize → L-BFGS warmup (4-layer
    # defense) → streaming Gauss-Newton (~2 GB cap) → denormalize + covariance.
    # ENGAGEMENT: only when the memory tier is LARGE/STREAMING (large datasets,
    # e.g. unfiltered multi-angle ~10M+ points). On STANDARD-tier (small/filtered)
    # data it does NOT engage even with enable=true — the normal joint fit runs.
    # PRECEDENCE: cmaes > multi_start > hybrid_streaming > local.
    # For 14-D heterodyne, normalization is the critical piece — without
    # it, L-BFGS struggles with the scale imbalance. Leave normalize=true.
    hybrid_streaming:
      enable: true                           # engages only at LARGE/STREAMING tier
      normalize: true                        # Phase 0 — ESSENTIAL for heterodyne
                                             # (handles the 5+ order scale span across
                                             # D0_ref / D0_sample / v0 / f0)
      normalization_strategy: "auto"         # "auto" (RECOMMENDED) | "bounds" | "p0" | "none"
      # ---- Phase 1: L-BFGS warmup ----
      warmup_iterations: 200                 # L-BFGS iters before switch check. CONSTRAINT: > 0
      max_warmup_iterations: 500             # force-switch to GN after this. CONSTRAINT: > 0
      warmup_learning_rate: 0.001            # L-BFGS line search scale. CONSTRAINT: > 0
      # ---- Phase 2: Gauss-Newton refinement ----
      gauss_newton_max_iterations: 100       # CONSTRAINT: > 0
      gauss_newton_tol: 1.0e-8               # CONSTRAINT: > 0
      # ---- Streaming settings ----
      chunk_size: 10000                      # points per J^T J chunk. CONSTRAINT: > 0
                                             # Tune to 1000-50000 based on RAM headroom.
                                             # 14-D heterodyne benefits from larger
                                             # chunks (better gradient estimates).
      trust_region_initial: 1.0              # initial trust-region radius
      regularization_factor: 1.0e-10         # Tikhonov reg for J^T J.
                                             # 14-D matrices benefit from slightly
                                             # higher reg — bump to 1e-9 if you see
                                             # "singular matrix" warnings.
      enable_checkpoints: true               # true = save mid-run checkpoints
      checkpoint_frequency: 100              # save every N iters
      validate_numerics: true                # true = NaN/Inf detection per step
      verbose: 1                             # 0 = silent | 1 = progress | 2 = debug
      log_frequency: 1                       # log every N iters

      # 4-layer warmup defense (NLSQ 0.3.6+) — keep all 4 enabled.
      # ESPECIALLY important for 14-D heterodyne where bad warm-starts
      # can send L-BFGS exploring nonsensical regions of parameter space.
      # L1: skip warmup if loss already small
      # L2: scale LR by initial loss quality
      # L3: abort if cost rises > 5%
      # L4: clip per-iteration step to fraction of normalized range
      enable_warm_start_detection: true
      warm_start_threshold: 0.01
      enable_adaptive_warmup_lr: true
      warmup_lr_refinement: 1.0e-6
      warmup_lr_careful: 1.0e-5
      enable_cost_guard: true
      cost_increase_tolerance: 0.05
      enable_step_clipping: true
      max_warmup_step_size: 0.1

    # Post-fit quality checks; emit warnings only, never raise.
    quality_validation:
      enable: true
      reduced_chi_squared_threshold: 10.0   # warn if χ²_red > 10. For 14-D
                                            # heterodyne with many local minima,
                                            # large χ² often means CMA-ES is needed.
      warn_on_max_restarts: true            # warn if CMA-ES hit max_restarts
      warn_on_bounds_hit: true              # warn if a param pinned at bounds.
                                            # Common heterodyne offenders:
                                            #   * phi0_het at ±10° (widen bounds)
                                            #   * D0_ref/sample at upper (sample is
                                            #     fitting wrong mode — try other priors)
      warn_on_convergence_failure: true     # warn if optimizer didn't converge
      bounds_tolerance: 1.0e-9              # distance to bound that counts as "at"

  # Streaming checkpoint/resume — auto-engages for >100M points.
  streaming:
    enable_checkpoints: true                # mid-run checkpoints
    checkpoint_dir: "./checkpoints"         # MUST be writeable
    checkpoint_frequency: 10                # save every N BATCHES
    resume_from_checkpoint: true            # true = auto-resume from latest
    keep_last_checkpoints: 3                # # of recent checkpoints to retain
    enable_fault_tolerance: true            # true = retry failed batches
    max_retries_per_batch: 2                # max retries per batch. CONSTRAINT: >= 0
    min_success_rate: 0.5                   # fit fails if rate < this. CONSTRAINT: [0, 1]
    batch_size: null                        # null = auto from memory | int = explicit
    adaptive_batching: true                 # dynamically size batches

  # Angle-stratified chunking — essential for heterodyne with per-angle scaling.
  stratification:
    enabled: "auto"                         # "auto" (RECOMMENDED) | true | false
    target_chunk_size: 100000               # target points per chunk. CONSTRAINT: > 0
    max_imbalance_ratio: 5.0                # fall back to sequential above this.
                                            # CONSTRAINT: > 0
    force_sequential_fallback: false        # true = skip stratification entirely
    check_memory_safety: true               # true = warn if peak > 70% of RAM
    use_index_based: false                  # true = zero-copy (~1% mem overhead)
    collect_diagnostics: false              # true = collect balance + coverage stats
    log_diagnostics: false                  # requires collect_diagnostics=true

  # Sequential per-angle solves — fallback when stratification cannot apply.
  sequential:
    min_success_rate: 0.5                   # fit fails if rate < this. CONSTRAINT: [0, 1]
    weighting: "inverse_variance"           # "inverse_variance" (RECOMMENDED)
                                            # "uniform" | "n_points"

  # Automatic retry with progressively conservative settings.
  recovery:
    enable: true                            # true = retry on failure
    max_attempts: 3                         # # of retries. CONSTRAINT: >= 0
    lr_decay: 0.5                           # halve LR on each retry
    lambda_growth: 2.0                      # double regularization on each retry
    trust_decay: 0.5                        # halve trust region on each retry
    log_retries: true

  # Optimizer-layer angle filter (distinct from top-level phi_filtering).
  # Usually leave off; top-level phi_filtering is the primary filter.
  angle_filtering:
    enabled: false                          # true = restrict angles further in NLSQ
    target_angle_ranges: []                 # list of {min_angle, max_angle} dicts

# -----------------------------------------------------------------------------
# NOISE ESTIMATION — Bayesian sub-tooling, disabled by default
# -----------------------------------------------------------------------------
noise_estimation:
  enabled: false
  model: "per_angle"

# -----------------------------------------------------------------------------
# PERFORMANCE
# -----------------------------------------------------------------------------
performance:
  strategy_override: null      # null = auto-select (RECOMMENDED)
                               # "standard" | "large" | "chunked" | "streaming"
  memory_limit_gb: null        # null = auto-detect; float = explicit GB cap
  enable_progress: true        # true = progress bars in xpcsjax ops

  memory_optimization:
    enabled: true              # true = memory-efficient code paths
    max_memory_usage_gb: 8.0   # 14-D heterodyne needs more headroom than static
                               # (Jacobian columns × 14 parameters).
                               # CONSTRAINT: > 0
    chunk_size: 8000           # default mem-aware chunk. CONSTRAINT: > 0
    enable_caching: true       # cache intermediate arrays for re-use
    cache_strategy: "adaptive" # "adaptive" (RECOMMENDED) | "aggressive" | "conservative"

  computation:
    enable_jit: true           # true = JAX JIT (RECOMMENDED). false = interpreter (debug)
    cpu_threads: "auto"        # "auto" = os.cpu_count() | int = explicit | 1 = single-threaded
    vectorization_level: "high"  # "low" | "medium" | "high" (RECOMMENDED)

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging:
  enabled: true                          # true = configure logging
  level: "INFO"                          # "DEBUG" | "INFO" | "WARNING" | "ERROR"
                                         # Root level — filters everything below

  console:
    enabled: true                        # true = log to stderr
    level: "INFO"                        # console-specific level
    format: "detailed"                   # "simple" | "detailed"
    colors: true                         # true = colorize levels (off if no tty)
    show_progress: true                  # true = render tqdm bars

  file:
    enabled: false                       # true = also log to rotating file
    level: "DEBUG"                       # capture verbose record for debugging
    path: "./logs/"                      # log directory (created if missing)
    filename: "xpcsjax_two_component.log"
    max_size_mb: 10                      # rotate at this size. CONSTRAINT: > 0
    backup_count: 5                      # # of backups. CONSTRAINT: >= 0

  modules:                               # per-module level overrides
    "xpcsjax.data.phi_filtering":     "INFO"
    "xpcsjax.data.xpcs_loader":       "INFO"
    "xpcsjax.optimization.nlsq":      "INFO"
    "xpcsjax.core.heterodyne_model":  "INFO"
    "jax._src":                       "WARNING"

# -----------------------------------------------------------------------------
# QUALITY CONTROL
# -----------------------------------------------------------------------------
quality_control:
  enabled: true

  angle_quality:
    validate_angle_coverage: true
    min_angles_per_range: 1
    check_angle_distribution: true

  multi_angle_validation:
    check_correlation_consistency: true
    validate_angle_dependencies: true
    detect_anomalous_angles: true

# -----------------------------------------------------------------------------
# PLOTTING
# -----------------------------------------------------------------------------
plotting:
  save_plots: true               # true = write plots to output.directory
  show_plots: false              # true = open interactive windows (off in CI)
  format: "png"                  # "png" (raster) | "pdf" (vector) | "svg" (editable)
  dpi: 300                       # 150 draft | 300 publication | 600 print. CONSTRAINT: > 0
  style: "publication"           # "publication" | "draft"

  preview_mode: true             # false = matplotlib | true = datashader
  fit_surface: "solver"          # "solver" | "posthoc"

  color_scale:
    mode: "legacy"               # "legacy" (fixed) | "adaptive" (percentile)
    pin_legacy_range: true
    percentile_min: 1.0          # adaptive lower percentile. CONSTRAINT: [0, 100]
    percentile_max: 99.0         # adaptive upper percentile. CONSTRAINT: [0, 100]
    fixed_min: 1.0               # legacy lower (c2 value)
    fixed_max: 1.5               # legacy upper (c2 value)

  datashader:                    # only used when preview_mode: true
    canvas_width: 1200           # pixels. CONSTRAINT: > 0
    canvas_height: 1200          # pixels. CONSTRAINT: > 0

  matplotlib:                    # only used when preview_mode: false
    interpolation: "bilinear"    # "none" | "bilinear" (default) | "bicubic"
    use_tight_layout: true
    savefig_kwargs:              # passed to plt.savefig()
      bbox_inches: "tight"
      pad_inches: 0.1

  # ---- Plot types to generate ----
  correlation_function: true     # c2(t1, t2) heatmap (per angle)
  fit_quality: true              # data-vs-fit overlay + residuals
  residual_analysis: true        # residual histograms + QQ plots
  angle_coverage: true           # polar plot of which angles were used
  angle_correlation: true        # ⭐ ESSENTIAL for heterodyne — shows the
                                 # cos(phi−phi0_het) cross-term modulation.
                                 # If flat, your phi0_het fit is bad.

# -----------------------------------------------------------------------------
# OUTPUT — where to write results
# -----------------------------------------------------------------------------
output:
  directory: "./results"                # results subdir under base_directory
  base_directory: "./xpcsjax_results/"  # top-level results directory

  formats:                              # enable multiple as needed
    hdf5: true                          # .h5  — large arrays + metadata
    json: true                          # .json — human-readable summary
    csv: true                           # .csv — spreadsheet-ready
    yaml: true                          # .yaml — config + result snapshot
    npz: true                           # .npz — numpy archive

  create_subdirs: true                  # true = per-method subdirs
  timestamp_dirs: false                 # true = append timestamp to dirs

  compress_hdf5: true                   # gzip HDF5 datasets
  compression_level: 6                  # 0-9 (0 none | 6 balanced | 9 max)
  include_diagnostics: true             # include diagnostic blocks in output

# -----------------------------------------------------------------------------
# VALIDATION — pre-run config sanity checks
# -----------------------------------------------------------------------------
validation:
  strict_mode: false                  # false = log warnings (RECOMMENDED)
                                      # true  = raise on first warning (CI-safe)
  check_file_existence: true          # true = verify files exist before starting
  validate_parameter_ranges: true     # true = check initial values within bounds
  check_mode_compatibility: true      # true = warn on mode-specific config mismatches

  angle_validation:
    require_multiple_angles: true     # ⚠ heterodyne REQUIRES ≥ 2 angles
    min_angle_count: 2                # required when require_multiple_angles=true
                                      # CONSTRAINT: >= 1
    validate_angle_ranges: true       # true = sanity-check phi values are in
                                      # reasonable range (no wraparound errors)
