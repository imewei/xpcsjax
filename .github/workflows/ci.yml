name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v3
      - name: Install Qt system libraries (headless PySide6)
        # PySide6 (pulled in via the pytest-qt plugin) links libEGL/libGL at
        # import time, which the bare ubuntu runner lacks -> pytest aborts with
        # `ImportError: libEGL.so.1`. Install the minimal runtime set; Qt then
        # runs under the offscreen platform (QT_QPA_PLATFORM below).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy xpcsjax
      - name: Test
        env:
          JAX_ENABLE_X64: "1"
          QT_QPA_PLATFORM: offscreen
          # Run the slow homodyne/laminar bit-equivalence parity gate (rtol=1e-10)
          # plus the heterodyne parity suite. Without this the gate self-skips.
          XPCSJAX_RUN_CHARACTERIZATION: "1"
        run: uv run pytest -v
