# Read the Docs configuration file for xpcsjax
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# The Sphinx project lives at docs/source/conf.py (furo theme + myst-parser,
# autodoc/autosummary/napoleon/intersphinx, sphinx-design, sphinx-copybutton,
# sphinx-autodoc-typehints). RTD installs the package together with its [docs]
# extra so autodoc can import xpcsjax and every Sphinx extension resolves.
#
# Divergences from homodyne/.readthedocs.yaml:
#   - Python pinned to 3.12 (xpcsjax requires-python = ">=3.12")
#   - Otherwise structurally identical (same OS, same apt packages for PDF).

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - texlive-xetex
    - texlive-fonts-recommended
    - fonts-dejavu
    - lmodern

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

sphinx:
  configuration: docs/source/conf.py
  # `make docs` builds locally with -W (warnings-as-errors); RTD is kept lenient
  # because intersphinx/inventory differences in the online build can surface
  # non-actionable warnings (conf.py already tightens nitpick handling).
  fail_on_warning: false

formats:
  - pdf
  - epub

# Submodules (if any)
submodules:
  include: []
  recursive: false
