# Read the Docs configuration file for xpcsjax
# See https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# FOLLOW-UP: This config expects a Sphinx project at `docs/source/conf.py`.
# That scaffolding does not exist yet — `docs/` currently only contains
# `superpowers/{plans,specs}` (design documents). Until Sphinx is scaffolded:
#   1. RTD builds will fail at the sphinx step (expected).
#   2. To scaffold: `mkdir -p docs/source && cd docs && sphinx-quickstart`,
#      then add `myst-parser`, `sphinx-autodoc-typehints`, etc. to
#      pyproject.toml's [project.optional-dependencies] under a `docs` extra,
#      and switch the `install` block below from `path: .` to extras: [docs].
#
# Divergences from homodyne/.readthedocs.yaml:
#   - Python pinned to 3.12 (xpcsjax requires-python = ">=3.12")
#   - Otherwise structurally identical (same OS, same apt packages for PDF).

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - texlive-xetex
    - texlive-fonts-recommended
    - fonts-dejavu
    - lmodern

python:
  install:
    - method: pip
      path: .
      # Once a [project.optional-dependencies].docs group is added in
      # pyproject.toml, switch to:
      # extra_requirements:
      #   - docs

sphinx:
  configuration: docs/source/conf.py
  # Allow warnings during build (intersphinx offline, etc.)
  fail_on_warning: false

formats:
  - pdf
  - epub

# Submodules (if any)
submodules:
  include: []
  recursive: false
